title: ZishanHack
email: contact@zishanhack.com
description: >-
  Offensive security research, practical methodologies,
  bug bounty workflows, Active Directory notes,
  and hands-on cybersecurity writeups.

baseurl: "/blog"
url: "https://zishanhack.com"

author: Zishan Ahamed Thandar

portfolio: "https://zishanhack.com/about"

timezone: Asia/Kolkata
lang: en

# =========================================================
# BUILD
# =========================================================

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

permalink: /:categories/:title/

future: false

# =========================================================
# PLUGINS
# =========================================================

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# =========================================================
# DEFAULTS
# =========================================================

defaults:

  # POSTS

  -
    scope:
      path: ""
      type: posts

    values:
      layout: post
      author: Zishan Ahamed Thandar

      image: /assets/images/og-image.png

      toc: true

  # PAGES

  -
    scope:
      path: ""

    values:
      image: /assets/images/og-image.png

# =========================================================
# EXCLUDE
# =========================================================

exclude:
  - README.md
  - vendor
  - Gemfile
  - Gemfile.lock

# =========================================================
# SEO
# =========================================================

twitter:
  username: ZishanAdThandar

social:
  name: ZishanHack

  links:
    - https://github.com/ZishanAdThandar
    - https://x.com/ZishanAdThandar
    - https://linkedin.com/in/ZishanAdThandar

logo: /assets/images/og-image.png

# =========================================================
# FEED
# =========================================================

feed:
  posts_limit: 20

# =========================================================
# PAGINATION READY
# =========================================================

paginate: 8
paginate_path: "/page/:num/"

