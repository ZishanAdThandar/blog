<!-- =========================================================
     TOC SCRIPT (FIXED - NO SCROLL FIGHTING)
========================================================= -->

<script>

document.addEventListener(
  "DOMContentLoaded",
  () => {

    const toc =
      document.getElementById(
        "table-of-contents"
      );

    const content =
      document.querySelector(
        ".article-content"
      );

    if (
      !toc ||
      !content
    ) return;

    /* =====================================================
       HEADINGS
    ===================================================== */

    const headings =
      Array.from(

        content.querySelectorAll(
          "h1, h2, h3, h4"
        )

      ).filter(
        (heading) => {

          return (
            heading.textContent
              .trim()
              .length > 0
          );

        }
      );

    /* =====================================================
       EMPTY TOC
    ===================================================== */

    if (
      headings.length === 0
    ) {

      toc.parentElement.style.display =
        "none";

      return;
    }

    /* =====================================================
       BUILD TOC
    ===================================================== */

    headings.forEach(
      (
        heading,
        index
      ) => {

        if (
          !heading.id
        ) {

          heading.id =
            `heading-${index}`;
        }

        const link =
          document.createElement(
            "a"
          );

        link.href =
          `#${heading.id}`;

        link.textContent =
          heading.textContent.trim();

        link.classList.add(
          `toc-${heading.tagName.toLowerCase()}`
        );

        toc.appendChild(
          link
        );

      }
    );

    /* =====================================================
       LINKS
    ===================================================== */

    const tocLinks =
      toc.querySelectorAll(
        "a"
      );

    /* =====================================================
       CLICK HANDLER - SMOOTH SCROLL TO HEADING
    ===================================================== */

    tocLinks.forEach(
      (link) => {

        link.addEventListener(
          "click",
          (e) => {

            e.preventDefault();

            const targetId =
              link.getAttribute("href");

            const targetElement =
              document.querySelector(targetId);

            if (
              targetElement
            ) {

              targetElement.scrollIntoView({

                behavior: "smooth",

                block: "start"

              });

              history.pushState(
                null,
                null,
                targetId
              );

            }

          }
        );

      }
    );

    /* =====================================================
       ACTIVE LINK (FIXED - NO AUTO SCROLL)
    ===================================================== */

    let currentActiveId = null;

    const setActiveLink =
      (id) => {

        if (currentActiveId === id) return;

        currentActiveId = id;

        tocLinks.forEach(
          (link) => {

            link.classList.remove(
              "active"
            );

            if (
              link.getAttribute(
                "href"
              ) === `#${id}`
            ) {

              link.classList.add(
                "active"
              );

            }

          }
        );

        /* ===============================================
           FIXED: NO scrollIntoView HERE
           This was causing the upward movement
           TOC will NOT auto-scroll anymore
        =============================================== */

      };

    /* =====================================================
       ACTIVE HEADING ON SCROLL
    ===================================================== */

    const updateActiveHeading =
      () => {

        let currentHeading =
          headings[0];

        for (
          let i = headings.length - 1;
          i >= 0;
          i--
        ) {

          const heading =
            headings[i];

          const rect =
            heading.getBoundingClientRect();

          if (
            rect.top <= 140
          ) {

            currentHeading =
              heading;

            break;

          }

        }

        if (
          currentHeading &&
          currentHeading.id !== currentActiveId
        ) {

          setActiveLink(
            currentHeading.id
          );

        }

      };

    /* =====================================================
       SCROLL EVENT (NO THROTTLE NEEDED, LIGHTWEIGHT)
    ===================================================== */

    window.addEventListener(
      "scroll",
      updateActiveHeading,
      {

        passive: true

      }
    );

    /* =====================================================
       INITIAL ACTIVE HEADING
    ===================================================== */

    updateActiveHeading();

  }
);

</script>
