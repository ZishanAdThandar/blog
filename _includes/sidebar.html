<aside class="sidebar" aria-label="Sidebar">

  <!-- TABLE OF CONTENTS -->
  <div class="sidebar-card toc-card" id="tocCard">
    <div class="sidebar-heading">
      <i class="fas fa-stream"></i>
      <span>On This Page</span>
    </div>
    <nav id="table-of-contents" aria-label="Table of contents"></nav>
  </div>

  <!-- MINI BRAND -->
  <div class="sidebar-card mini-brand">
    <div class="mini-brand-logo">
      <i class="fas fa-shield-halved"></i>
      <span>ZISHAN<span class="logo-highlight">HACK</span></span>
    </div>
    <p>
      Offensive security research, practical labs,
      Active Directory methodologies,
      web exploitation, and technical cybersecurity notes.
    </p>
    <a href="https://zishanhack.com/#resources" class="btn btn-premium sidebar-cta" target="_blank" rel="noopener noreferrer">
      <i class="fas fa-gem"></i> Premium Resources
    </a>
  </div>

</aside>

<script>
(function () {
  "use strict";

  var initialized = false;

  function initTOC() {
    if (initialized) return;

    var toc = document.getElementById("table-of-contents");
    var tocCard = document.getElementById("tocCard");
    if (!toc) return;

    // Find the article content area
    var content = (
      document.querySelector(".article-content") ||
      document.querySelector(".blog-content") ||
      document.querySelector("article") ||
      document.querySelector("main")
    );

    if (!content) {
      tocCard && (tocCard.style.display = "none");
      return;
    }

    var headings = content.querySelectorAll("h2, h3, h4");

    if (headings.length < 2) {
      // Not enough headings — hide the TOC card
      tocCard && (tocCard.style.display = "none");
      return;
    }

    initialized = true;
    toc.innerHTML = "";

    // Assign IDs and build links
    headings.forEach(function (heading, i) {
      if (!heading.id) {
        heading.id = "heading-" + i + "-" + heading.tagName.toLowerCase();
      }

      var a = document.createElement("a");
      a.href = "#" + heading.id;
      a.textContent = heading.textContent.trim();
      a.className = "toc-" + heading.tagName.toLowerCase();

      a.addEventListener("click", function (e) {
        e.preventDefault();
        var target = document.getElementById(heading.id);
        if (target) {
          var offset = 80; // fixed header height
          var top = target.getBoundingClientRect().top + window.pageYOffset - offset;
          window.scrollTo({ top: top, behavior: "smooth" });
          history.replaceState(null, "", "#" + heading.id);
        }
      });

      toc.appendChild(a);
    });

    // Active-link highlight on scroll
    var tocLinks = toc.querySelectorAll("a");
    var HEADER_OFFSET = 100;

    function markActive() {
      var scrollY = window.pageYOffset + HEADER_OFFSET;
      var activeId = null;

      headings.forEach(function (h) {
        if (h.offsetTop <= scrollY) activeId = h.id;
      });

      tocLinks.forEach(function (link) {
        link.classList.toggle(
          "active",
          link.getAttribute("href") === "#" + activeId
        );
      });
    }

    window.addEventListener("scroll", markActive, { passive: true });
    markActive();
  }

  // Single init point — run after DOM is ready
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initTOC);
  } else {
    initTOC();
  }
})();
</script>
