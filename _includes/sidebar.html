<aside class="sidebar">

  <div class="sidebar-card toc-card">

    <div class="sidebar-heading">

      <i class="fas fa-stream"></i>

      <span>
        On This Page
      </span>

    </div>

    <nav id="table-of-contents"></nav>

  </div>

</aside>




<script>
// Use a closure to prevent global pollution and track initialization
(function() {
  // Prevent duplicate execution
  if (window._TOC_INITIALIZED === true) {
    console.warn("TOC already initialized, skipping duplicate run");
    return;
  }
  window._TOC_INITIALIZED = true;
  
  // Store processed headings to prevent duplicates across multiple runs
  const processedHeadings = new Map(); // key: normalized text, value: heading element
  
  function initTOC() {
    const tocContainer = document.getElementById("table-of-contents");
    const contentArea = document.querySelector(".article-markdown");
    
    if (!tocContainer || !contentArea) {
      console.warn("TOC or content container not found");
      return;
    }
    
    // Clear container completely before building
    tocContainer.innerHTML = "";
    
    /* =====================================================
       STEP 1: COLLECT ALL POTENTIAL HEADINGS
    ===================================================== */
    const allHeadings = Array.from(contentArea.querySelectorAll("h1, h2, h3, h4"));
    
    /* =====================================================
       STEP 2: STRICT EXCLUSION FILTER
       Matches Chirpy's approach of excluding any heading inside 
       sidebars, cards, or related content sections
    ===================================================== */
    const validHeadings = [];
    
    for (let i = 0; i < allHeadings.length; i++) {
      const heading = allHeadings[i];
      const text = heading.textContent.trim();
      
      // Skip empty headings
      if (text === "") continue;
      
      // Check if heading is inside excluded elements
      let isInExcludedArea = false;
      
      // Exclude selectors - more comprehensive than original
      const excludeSelectors = [
        ".sidebar", 
        ".toc-ignore", 
        ".related-posts",
        ".post-item",
        ".card",
        "[class*='card']",
        ".comments-area",
        ".footer",
        ".share-buttons",
        ".author-box",
        ".newsletter",
        ".similar-posts",
        ".recommendations"
      ];
      
      for (let selector of excludeSelectors) {
        if (heading.closest(selector)) {
          isInExcludedArea = true;
          break;
        }
      }
      
      if (isInExcludedArea) continue;
      
      // Skip hidden elements
      if (heading.offsetParent === null) continue;
      
      validHeadings.push(heading);
    }
    
    /* =====================================================
       STEP 3: DEDUPLICATION - KEY FIX
       Unlike your original code that only checks .post-item,
       this properly deduplicates based on:
       a) Same text within same parent section
       b) Consecutive identical headings
    ===================================================== */
    const uniqueHeadings = [];
    const headingSignature = new Set(); // Track by (parentPath + text)
    
    for (let i = 0; i < validHeadings.length; i++) {
      const heading = validHeadings[i];
      const text = heading.textContent.trim();
      const normalizedText = text.toLowerCase().replace(/\s+/g, " ");
      
      // Get parent context to differentiate same text in different sections
      let parentContext = "";
      let parent = heading.parentElement;
      let depth = 0;
      while (parent && parent !== contentArea && depth < 3) {
        if (parent.id) {
          parentContext = parent.id + "|";
          break;
        }
        if (parent.classList && parent.classList.length > 0) {
          parentContext = parent.classList[0] + "|";
        }
        parent = parent.parentElement;
        depth++;
      }
      
      const uniqueKey = parentContext + normalizedText;
      
      // Skip if we've seen this exact heading in same context
      if (headingSignature.has(uniqueKey)) {
        continue;
      }
      
      // Skip consecutive duplicates (same heading appears back-to-back)
      if (i > 0 && validHeadings[i-1].textContent.trim().toLowerCase() === normalizedText) {
        continue;
      }
      
      headingSignature.add(uniqueKey);
      uniqueHeadings.push(heading);
    }
    
    /* =====================================================
       STEP 4: CHECK IF WE HAVE ANY HEADINGS
    ===================================================== */
    if (uniqueHeadings.length === 0) {
      const tocCard = tocContainer.closest(".toc-card");
      if (tocCard) tocCard.style.display = "none";
      return;
    }
    
    /* =====================================================
       STEP 5: ASSIGN PERSISTENT IDs (CHIRPY STYLE)
       This is critical - Chirpy maintains a registry of IDs
       to ensure headings always get the same ID on every run
    ===================================================== */
    const usedIds = new Set();
    
    // First, restore any previously assigned IDs from our Map
    for (let i = 0; i < uniqueHeadings.length; i++) {
      const heading = uniqueHeadings[i];
      const text = heading.textContent.trim();
      
      if (processedHeadings.has(text)) {
        const existingId = processedHeadings.get(text);
        if (!usedIds.has(existingId)) {
          heading.id = existingId;
          usedIds.add(existingId);
        }
      }
    }
    
    // Generate IDs for headings without one
    for (let i = 0; i < uniqueHeadings.length; i++) {
      const heading = uniqueHeadings[i];
      
      // Skip if ID already assigned
      if (heading.id && heading.id.trim() !== "" && !usedIds.has(heading.id)) {
        usedIds.add(heading.id);
        processedHeadings.set(heading.textContent.trim(), heading.id);
        continue;
      }
      
      // Generate new ID
      let baseId = heading.textContent
        .trim()
        .toLowerCase()
        .replace(/[^\w\u4e00-\u9fff]+/g, "-")
        .replace(/^-+|-+$/g, "");
      
      if (!baseId || baseId.length < 2) {
        baseId = `section-${i + 1}`;
      }
      
      let finalId = baseId;
      let counter = 1;
      while (usedIds.has(finalId)) {
        finalId = `${baseId}-${counter}`;
        counter++;
      }
      
      heading.id = finalId;
      usedIds.add(finalId);
      processedHeadings.set(heading.textContent.trim(), finalId);
    }
    
    /* =====================================================
       STEP 6: BUILD THE TOC
    ===================================================== */
    for (let i = 0; i < uniqueHeadings.length; i++) {
      const heading = uniqueHeadings[i];
      const link = document.createElement("a");
      
      link.href = `#${heading.id}`;
      link.textContent = heading.textContent.trim();
      link.className = `toc-link toc-${heading.tagName.toLowerCase()}`;
      
      // Smooth scroll handler
      link.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        
        const targetId = link.getAttribute("href").substring(1);
        const targetEl = document.getElementById(targetId);
        
        if (targetEl) {
          const offset = 110;
          const top = targetEl.getBoundingClientRect().top + window.pageYOffset - offset;
          window.scrollTo({ top, behavior: "smooth" });
          history.replaceState(null, "", `#${targetId}`);
        }
      });
      
      tocContainer.appendChild(link);
    }
    
    /* =====================================================
       STEP 7: ACTIVE LINK TRACKING (SCROLL SPY)
       Similar to Chirpy's scroll spy functionality
    ===================================================== */
    const tocLinks = Array.from(tocContainer.querySelectorAll("a"));
    
    function updateActiveLink() {
      if (uniqueHeadings.length === 0) return;
      
      let currentActive = uniqueHeadings[0];
      const offset = 180;
      
      // Find the last heading above the scroll position
      for (let i = uniqueHeadings.length - 1; i >= 0; i--) {
        const heading = uniqueHeadings[i];
        const rect = heading.getBoundingClientRect();
        if (rect.top <= offset) {
          currentActive = heading;
          break;
        }
      }
      
      // Update active class on links
      for (let i = 0; i < tocLinks.length; i++) {
        const link = tocLinks[i];
        const href = link.getAttribute("href");
        const isActive = href === `#${currentActive.id}`;
        
        link.classList.toggle("active", isActive);
        
        if (isActive) {
          link.scrollIntoView({ block: "nearest", behavior: "smooth" });
        }
      }
    }
    
    // Throttled scroll handler
    let scrollTicking = false;
    window.addEventListener("scroll", () => {
      if (!scrollTicking) {
        requestAnimationFrame(() => {
          updateActiveLink();
          scrollTicking = false;
        });
        scrollTicking = true;
      }
    }, { passive: true });
    
    window.addEventListener("resize", () => updateActiveLink());
    
    // Initial update
    updateActiveLink();
    
    // Handle hash navigation on load
    if (window.location.hash) {
      setTimeout(() => {
        const targetId = window.location.hash.substring(1);
        const targetEl = document.getElementById(targetId);
        if (targetEl) {
          const offset = 110;
          const top = targetEl.getBoundingClientRect().top + window.pageYOffset - offset;
          window.scrollTo({ top, behavior: "smooth" });
        }
      }, 150);
    }
  }
  
  // Initialize when DOM is ready
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initTOC);
  } else {
    initTOC();
  }
})();
</script>
