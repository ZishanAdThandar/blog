<aside class="sidebar">

  <div class="sidebar-card toc-card">

    <div class="sidebar-heading">

      <i class="fas fa-stream"></i>

      <span>
        On This Page
      </span>

    </div>

    <nav id="table-of-contents"></nav>

  </div>

</aside>

<script>

document.addEventListener(
  "DOMContentLoaded",
  () => {

    /* =====================================================
       ELEMENTS
    ===================================================== */

    const toc =
      document.getElementById(
        "table-of-contents"
      );

    const content =
      document.querySelector(
        ".article-markdown"
      );

    if (
      !toc ||
      !content
    ) return;

    /* =====================================================
       RESET
    ===================================================== */

    toc.innerHTML = "";

    /* =====================================================
       FIND HEADINGS
    ===================================================== */

    const headings =
      Array.from(

        content.querySelectorAll(
          "h1, h2, h3, h4"
        )

      ).filter(
        (heading) => {

          const text =
            heading.textContent
              .trim();

          /* =========================================
             EMPTY
          ========================================= */

          if (
            text.length === 0
          ) {

            return false;
          }

          /* =========================================
             IGNORE TOC
          ========================================= */

          if (
            heading.closest(
              ".sidebar"
            )
          ) {

            return false;
          }

          /* =========================================
             IGNORE MANUAL EXCLUSIONS
          ========================================= */

          if (
            heading.closest(
              ".toc-ignore"
            )
          ) {

            return false;
          }

          /* =========================================
             IGNORE RELATED POSTS
          ========================================= */

          if (
            heading.closest(
              ".related-posts"
            )
          ) {

            return false;
          }

          /* =========================================
             IGNORE CARDS
          ========================================= */

          if (
            heading.closest(
              ".post-item"
            )
          ) {

            return false;
          }

          /* =========================================
             IGNORE HIDDEN
          ========================================= */

          if (
            heading.offsetParent === null
          ) {

            return false;
          }

          return true;

        }
      );

    /* =====================================================
       NO HEADINGS
    ===================================================== */

    if (
      headings.length === 0
    ) {

      toc.parentElement.style.display =
        "none";

      return;
    }

    /* =====================================================
       UNIQUE IDS
    ===================================================== */

    headings.forEach(
      (
        heading,
        index
      ) => {

        /* =========================================
           KEEP EXISTING IDS
        ========================================= */

        if (
          heading.id
        ) return;

        heading.id =

          heading.textContent
            .trim()
            .toLowerCase()
            .replace(/[^\w]+/g, "-")
            .replace(/^-+|-+$/g, "") +

          `-${index}`;

      }
    );

    /* =====================================================
       BUILD TOC
    ===================================================== */

    headings.forEach(
      (
        heading
      ) => {

        const link =
          document.createElement(
            "a"
          );

        link.href =
          `#${heading.id}`;

        link.textContent =
          heading.textContent
            .trim();

        link.classList.add(
          `toc-${heading.tagName.toLowerCase()}`
        );

        /* =========================================
           CLICK
        ========================================= */

        link.addEventListener(
          "click",
          (e) => {

            e.preventDefault();

            const offset =
              110;

            const top =

              heading.getBoundingClientRect().top +

              window.pageYOffset -

              offset;

            window.scrollTo({

              top,
              behavior: "smooth"

            });

            history.replaceState(

              null,
              "",
              `#${heading.id}`

            );

          }
        );

        toc.appendChild(
          link
        );

      }
    );

    /* =====================================================
       TOC LINKS
    ===================================================== */

    const tocLinks =
      Array.from(
        toc.querySelectorAll(
          "a"
        )
      );

    /* =====================================================
       ACTIVE LINK
    ===================================================== */

    function setActive(id) {

      let activeLink =
        null;

      tocLinks.forEach(
        (link) => {

          const isActive =

            link.getAttribute(
              "href"
            ) === `#${id}`;

          link.classList.toggle(
            "active",
            isActive
          );

          if (
            isActive
          ) {

            activeLink =
              link;
          }

        }
      );

      /* =========================================
         KEEP ACTIVE VISIBLE
      ========================================= */

      if (
        !activeLink
      ) return;

      activeLink.scrollIntoView({

        block: "nearest",
        behavior: "smooth"

      });

    }

    /* =====================================================
       ACTIVE TRACKING
    ===================================================== */

    function updateActiveHeading() {

      let current =
        headings[0];

      const offset =
        180;

      headings.forEach(
        (heading) => {

          const rect =
            heading.getBoundingClientRect();

          if (
            rect.top <= offset
          ) {

            current =
              heading;
          }

        }
      );

      setActive(
        current.id
      );

    }

    /* =====================================================
       SCROLL
    ===================================================== */

    let ticking =
      false;

    window.addEventListener(
      "scroll",
      () => {

        if (
          !ticking
        ) {

          window.requestAnimationFrame(
            () => {

              updateActiveHeading();

              ticking =
                false;

            }
          );

          ticking =
            true;
        }

      },

      {

        passive: true

      }

    );

    /* =====================================================
       RESIZE
    ===================================================== */

    window.addEventListener(
      "resize",
      updateActiveHeading
    );

    /* =====================================================
       INITIAL
    ===================================================== */

    updateActiveHeading();

  }
);

</script>
