<!-- =========================================================
     TOC SCRIPT
========================================================= -->
<script>

document.addEventListener(
  "DOMContentLoaded",
  () => {

    const toc =
      document.getElementById(
        "table-of-contents"
      );

    const article =
      document.querySelector(
        ".blog-content article"
      );

    if (
      !toc ||
      !article
    ) return;

    /* =====================================================
       ONLY ARTICLE HEADINGS
    ===================================================== */

    const headings =
      article.querySelectorAll(
        "h1, h2, h3, h4"
      );

    if (
      headings.length === 0
    ) {

      toc.parentElement.style.display =
        "none";

      return;
    }

    /* =====================================================
       BUILD TOC
    ===================================================== */

    headings.forEach(
      (
        heading,
        index
      ) => {

        if (
          !heading.id
        ) {

          heading.id =
            `heading-${index}`;
        }

        const link =
          document.createElement(
            "a"
          );

        link.href =
          `#${heading.id}`;

        link.textContent =
          heading.textContent;

        const level =
          heading.tagName.toLowerCase();

        link.classList.add(
          `toc-${level}`
        );

        toc.appendChild(
          link
        );

      }
    );

    /* =====================================================
       ACTIVE EFFECT
    ===================================================== */

    const tocLinks =
      toc.querySelectorAll(
        "a"
      );

    const setActiveLink =
      (id) => {

        tocLinks.forEach(
          (link) => {

            link.classList.remove(
              "active"
            );

            if (
              link.getAttribute(
                "href"
              ) === `#${id}`
            ) {

              link.classList.add(
                "active"
              );

            }

          }
        );

      };

    /* =====================================================
       INTERSECTION OBSERVER
    ===================================================== */

const observer =
  new IntersectionObserver(

    (entries) => {

      let visibleHeading = null;

      entries.forEach(
        (entry) => {

          if (
            entry.isIntersecting
          ) {

            visibleHeading =
              entry.target.id;

          }

        }
      );

      if (
        visibleHeading
      ) {

        setActiveLink(
          visibleHeading
        );

      }

    },

    {

      rootMargin:
        "-12% 0px -72% 0px",

      threshold: 0.2
    }

  );
    headings.forEach(
      (heading) => {

        observer.observe(
          heading
        );

      }
    );

  }
);

</script>
