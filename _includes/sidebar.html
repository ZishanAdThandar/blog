<aside class="sidebar">

  <div class="sidebar-card toc-card">

    <div class="sidebar-heading">

      <i class="fas fa-stream"></i>

      <span>

        On This Page

      </span>

    </div>

    <nav id="table-of-contents"></nav>

  </div>

</aside>

<script>

document.addEventListener(
  "DOMContentLoaded",
  () => {

    /* =====================================================
       ELEMENTS
    ===================================================== */

    const toc =
      document.getElementById(
        "table-of-contents"
      );

    const content =
      document.querySelector(
        ".article-markdown"
      );

    if (
      !toc ||
      !content
    ) return;

    /* =====================================================
       HEADINGS
    ===================================================== */

const headings =
  Array.from(

    content.querySelectorAll(
      "h1, h2, h3, h4"
    )

  ).filter(
    (heading) => {

      /* =========================================
         EMPTY
      ========================================= */

      if (
        heading.textContent
          .trim()
          .length === 0
      ) {

        return false;
      }

      /* =========================================
         IGNORE INSIDE CARDS
      ========================================= */

      if (
        heading.closest(
          ".post-item"
        )
      ) {

        return false;
      }

      /* =========================================
         IGNORE TOC ITSELF
      ========================================= */

      if (
        heading.closest(
          ".sidebar"
        )
      ) {

        return false;
      }

      /* =========================================
         IGNORE HIDDEN
      ========================================= */

      if (
        heading.offsetParent === null
      ) {

        return false;
      }

      return true;

    }
  );

    /* =====================================================
       NO HEADINGS
    ===================================================== */

    if (
      headings.length === 0
    ) {

      toc.parentElement.style.display =
        "none";

      return;
    }

    /* =====================================================
       CLEAR TOC
    ===================================================== */

    toc.innerHTML = "";

    /* =====================================================
       BUILD TOC
    ===================================================== */

    headings.forEach(
      (
        heading,
        index
      ) => {

        /* ===============================================
           AUTO ID
        =============================================== */

        if (
          !heading.id
        ) {

          heading.id =
            `heading-${index}`;
        }

        /* ===============================================
           CREATE LINK
        =============================================== */

        const link =
          document.createElement(
            "a"
          );

        link.href =
          `#${heading.id}`;

        link.textContent =
          heading.textContent.trim();

        link.classList.add(
          `toc-${heading.tagName.toLowerCase()}`
        );

        /* ===============================================
           CLICK
        =============================================== */

        link.addEventListener(
          "click",
          (e) => {

            e.preventDefault();

            const offset =
              110;

            const top =
              heading.offsetTop -
              offset;

            window.scrollTo({

              top,
              behavior: "smooth"

            });

            history.replaceState(

              null,
              null,
              `#${heading.id}`

            );

          }
        );

        toc.appendChild(
          link
        );

      }
    );

    /* =====================================================
       TOC LINKS
    ===================================================== */

    const tocLinks =
      Array.from(
        toc.querySelectorAll(
          "a"
        )
      );

    /* =====================================================
       SET ACTIVE
    ===================================================== */

    function setActive(id) {

      let activeLink = null;

      tocLinks.forEach(
        (link) => {

          const isActive =
            link.getAttribute(
              "href"
            ) === `#${id}`;

          link.classList.toggle(
            "active",
            isActive
          );

          if (
            isActive
          ) {

            activeLink =
              link;
          }

        }
      );

      /* ===============================================
         KEEP ACTIVE LINK VISIBLE
      =============================================== */

      if (
        activeLink
      ) {

        const containerTop =
          toc.scrollTop;

        const containerBottom =
          containerTop +
          toc.clientHeight;

        const linkTop =
          activeLink.offsetTop;

        const linkBottom =
          linkTop +
          activeLink.offsetHeight;

        if (
          linkBottom >
          containerBottom
        ) {

          toc.scrollTop =
            linkBottom -
            toc.clientHeight +
            24;
        }

        else if (
          linkTop <
          containerTop
        ) {

          toc.scrollTop =
            linkTop - 24;
        }

      }

    }

    /* =====================================================
       STANDARD DOCS ACTIVE TRACKING
    ===================================================== */
function updateActiveHeading() {

  let current =
    headings[0];

  const viewportOffset =
    180;

  /* ===============================================
     FIND CURRENT HEADING
  =============================================== */

  headings.forEach(
    (heading) => {

      const rect =
        heading.getBoundingClientRect();

      if (
        rect.top <=
        viewportOffset
      ) {

        current =
          heading;
      }

    }
  );

  /* ===============================================
     SET ACTIVE
  =============================================== */

  setActive(
    current.id
  );

  /* ===============================================
     KEEP ACTIVE LINK VISIBLE
  =============================================== */

  const activeLink =
    toc.querySelector(
      ".active"
    );

  if (
    !activeLink
  ) return;

  const linkTop =
    activeLink.offsetTop;

  const linkBottom =
    linkTop +
    activeLink.offsetHeight;

  const visibleTop =
    toc.scrollTop;

  const visibleBottom =
    visibleTop +
    toc.clientHeight;

  /* ===============================================
     BELOW VIEW
  =============================================== */

  if (
    linkBottom >
    visibleBottom - 20
  ) {

    toc.scrollTop =
      linkBottom -
      toc.clientHeight +
      40;
  }

  /* ===============================================
     ABOVE VIEW
  =============================================== */

  else if (
    linkTop <
    visibleTop + 20
  ) {

    toc.scrollTop =
      linkTop - 40;
  }

}

    /* =====================================================
       SCROLL EVENT
    ===================================================== */

    let ticking =
      false;

    window.addEventListener(
      "scroll",
      () => {

        if (
          !ticking
        ) {

          window.requestAnimationFrame(
            () => {

              updateActiveHeading();

              ticking = false;

            }
          );

          ticking = true;

        }

      },

      {

        passive: true

      }

    );

    /* =====================================================
       RESIZE
    ===================================================== */

    window.addEventListener(
      "resize",
      updateActiveHeading
    );

    /* =====================================================
       INITIAL
    ===================================================== */

    updateActiveHeading();

  }
);

</script>
