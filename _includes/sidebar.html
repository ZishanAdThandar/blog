<aside class="sidebar">

  <!-- =========================================================
       TABLE OF CONTENTS
  ========================================================= -->

  <div class="sidebar-card toc-card">

    <div class="sidebar-heading">

      <i class="fas fa-stream"></i>

      <span>

        On This Page

      </span>

    </div>

    <nav id="table-of-contents"></nav>

  </div>

</aside>

<!-- =========================================================
     TOC SCRIPT
========================================================= -->

<script>

(function () {

  function initTOC() {

    const toc =
      document.getElementById(
        "table-of-contents"
      );

    if (!toc) return;

    /* =====================================================
       ARTICLE CONTENT ONLY
    ===================================================== */

    const content =
      document.querySelector(
        ".article-content"
      );

    if (!content) return;

    /* =====================================================
       GET HEADINGS
    ===================================================== */

    const headings =
      Array.from(

        content.querySelectorAll(
          "h1, h2, h3, h4"
        )

      ).filter(
        (heading) => {

          return (
            heading.textContent
              .trim()
              .length > 0
          );

        }
      );

    /* =====================================================
       NO HEADINGS
    ===================================================== */

    if (
      headings.length === 0
    ) {

      toc.parentElement.style.display =
        "none";

      return;
    }

    /* =====================================================
       CLEAR TOC
    ===================================================== */

    toc.innerHTML = "";

    /* =====================================================
       BUILD TOC
    ===================================================== */

    headings.forEach(
      (
        heading,
        index
      ) => {

        /* ===============================================
           AUTO ID
        =============================================== */

        if (
          !heading.id
        ) {

          heading.id =
            `toc-heading-${index}`;
        }

        /* ===============================================
           CREATE LINK
        =============================================== */

        const link =
          document.createElement(
            "a"
          );

        link.href =
          `#${heading.id}`;

        link.textContent =
          heading.textContent.trim();

        link.classList.add(
          `toc-${heading.tagName.toLowerCase()}`
        );

        /* ===============================================
           SMOOTH SCROLL
        =============================================== */

        link.addEventListener(
          "click",
          (e) => {

            e.preventDefault();

            const offset =
              110;

            const top =
              heading
                .getBoundingClientRect()
                .top +
              window.pageYOffset -
              offset;

            window.scrollTo({

              top: top,

              behavior: "smooth"

            });

            history.replaceState(

              null,
              null,
              `#${heading.id}`

            );

          }
        );

        toc.appendChild(
          link
        );

      }
    );

    /* =====================================================
       TOC LINKS
    ===================================================== */

    const tocLinks =
      toc.querySelectorAll(
        "a"
      );

    /* =====================================================
       ACTIVE LINK
    ===================================================== */

    function updateActive() {

      let currentId =
        headings[0].id;

      headings.forEach(
        (heading) => {

          const rect =
            heading.getBoundingClientRect();

          if (
            rect.top <= 160
          ) {

            currentId =
              heading.id;

          }

        }
      );

      tocLinks.forEach(
        (link) => {

          link.classList.remove(
            "active"
          );

          if (
            link.getAttribute(
              "href"
            ) === `#${currentId}`
          ) {

            link.classList.add(
              "active"
            );

            /* =========================================
               KEEP ACTIVE ITEM VISIBLE
            ========================================= */

            const linkTop =
              link.offsetTop;

            const linkBottom =
              linkTop +
              link.offsetHeight;

            const tocTop =
              toc.scrollTop;

            const tocBottom =
              tocTop +
              toc.clientHeight;

            /* =========================================
               SCROLL DOWN
            ========================================= */

            if (
              linkBottom >
              tocBottom
            ) {

              toc.scrollTo({

                top:
                  linkBottom -
                  toc.clientHeight +
                  20,

                behavior: "smooth"

              });

            }

            /* =========================================
               SCROLL UP
            ========================================= */

            else if (
              linkTop <
              tocTop
            ) {

              toc.scrollTo({

                top:
                  linkTop - 20,

                behavior: "smooth"

              });

            }

          }

        }
      );

    }

    /* =====================================================
       EVENTS
    ===================================================== */

    window.addEventListener(
      "scroll",
      updateActive,
      {

        passive: true

      }
    );

    window.addEventListener(
      "resize",
      updateActive
    );

    /* =====================================================
       INITIAL
    ===================================================== */

    updateActive();

  }

  /* =======================================================
     DOM READY
  ======================================================= */

  if (
    document.readyState ===
    "loading"
  ) {

    document.addEventListener(
      "DOMContentLoaded",
      initTOC
    );

  } else {

    initTOC();

  }

})();

</script>
