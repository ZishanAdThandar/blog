<aside class="sidebar">

  <div class="sidebar-card toc-card">

    <div class="sidebar-heading">

      <i class="fas fa-stream"></i>

      <span>
        On This Page
      </span>

    </div>

    <nav id="table-of-contents"></nav>

  </div>

</aside>

<script>

document.addEventListener(
  "DOMContentLoaded",
  () => {

    /* =====================================================
       ELEMENTS
    ===================================================== */

    const toc =
      document.getElementById(
        "table-of-contents"
      );

    const content =
      document.querySelector(
        ".article-markdown"
      );

    if (
      !toc ||
      !content
    ) return;

    /* =====================================================
       RESET
    ===================================================== */

    toc.innerHTML = "";

    /* =====================================================
       FIND HEADINGS - DEDUPLICATED BY ID AND TEXT
    ===================================================== */

    const allHeadings =
      Array.from(

        content.querySelectorAll(
          "h1, h2, h3, h4"
        )

      ).filter(
        (heading) => {

          const text =
            heading.textContent
              .trim();

          /* =========================================
             EMPTY
          ========================================= */

          if (
            text.length === 0
          ) {

            return false;
          }

          /* =========================================
             IGNORE TOC
          ========================================= */

          if (
            heading.closest(
              ".sidebar"
            )
          ) {

            return false;
          }

          /* =========================================
             IGNORE MANUAL EXCLUSIONS
          ========================================= */

          if (
            heading.closest(
              ".toc-ignore"
            )
          ) {

            return false;
          }

          /* =========================================
             IGNORE RELATED POSTS
          ========================================= */

          if (
            heading.closest(
              ".related-posts"
            )
          ) {

            return false;
          }

          /* =========================================
             IGNORE CARDS
          ========================================= */

          if (
            heading.closest(
              ".post-item"
            )
          ) {

            return false;
          }

          /* =========================================
             IGNORE HIDDEN
          ========================================= */

          if (
            heading.offsetParent === null
          ) {

            return false;
          }

          return true;

        }
      );

    /* =====================================================
       DEDUPLICATE HEADINGS - FIX FOR REPEATING TWICE
    ===================================================== */

    const seenKeys = new Map();
    const headings = [];

    allHeadings.forEach(
      (heading) => {
        const text = heading.textContent.trim().toLowerCase();
        const parentPath = getParentPath(heading);
        const uniqueKey = `${parentPath}|${text}`;
        
        if (!seenKeys.has(uniqueKey)) {
          seenKeys.set(uniqueKey, heading);
          headings.push(heading);
        }
      }
    );

    /* Helper function to get parent element path for better deduplication */
    function getParentPath(element) {
      let path = [];
      let current = element.parentElement;
      let depth = 0;
      while (current && current !== content && depth < 5) {
        if (current.id) {
          path.unshift(current.id);
        } else if (current.className && typeof current.className === 'string') {
          const classNames = current.className.split(' ').slice(0, 2);
          if (classNames.length) {
            path.unshift(classNames.join('.'));
          }
        }
        current = current.parentElement;
        depth++;
      }
      return path.join('>');
    }

    /* =====================================================
       NO HEADINGS
    ===================================================== */

    if (
      headings.length === 0
    ) {

      toc.parentElement.style.display =
        "none";

      return;
    }

    /* =====================================================
       UNIQUE IDS - PREVENT DUPLICATE IDS
    ===================================================== */

    const usedIds = new Set();

    headings.forEach(
      (
        heading,
        index
      ) => {

        /* =========================================
           KEEP EXISTING IDS IF UNIQUE
        ========================================= */

        if (heading.id) {
          if (!usedIds.has(heading.id)) {
            usedIds.add(heading.id);
            return;
          }
        }

        /* Generate unique ID */
        let baseId =
          heading.textContent
            .trim()
            .toLowerCase()
            .replace(/[^\w]+/g, "-")
            .replace(/^-+|-+$/g, "");

        if (!baseId) {
          baseId = "heading";
        }

        let finalId = baseId;
        let counter = 1;

        while (usedIds.has(finalId)) {
          finalId = `${baseId}-${counter}`;
          counter++;
        }

        heading.id = finalId;
        usedIds.add(finalId);
      }
    );

    /* =====================================================
       BUILD TOC - CLEAN BUILD WITHOUT DUPLICATES
    ===================================================== */

    /* Clear again to ensure clean state */
    toc.innerHTML = "";

    headings.forEach(
      (
        heading
      ) => {

        const link =
          document.createElement(
            "a"
          );

        link.href =
          `#${heading.id}`;

        link.textContent =
          heading.textContent
            .trim();

        link.classList.add(
          `toc-${heading.tagName.toLowerCase()}`
        );

        /* =========================================
           CLICK
        ========================================= */

        link.addEventListener(
          "click",
          (e) => {

            e.preventDefault();

            const offset =
              110;

            const top =

              heading.getBoundingClientRect().top +

              window.pageYOffset -

              offset;

            window.scrollTo({

              top,
              behavior: "smooth"

            });

            history.replaceState(

              null,
              "",
              `#${heading.id}`

            );

          }
        );

        toc.appendChild(
          link
        );

      }
    );

    /* =====================================================
       TOC LINKS
    ===================================================== */

    const tocLinks =
      Array.from(
        toc.querySelectorAll(
          "a"
        )
      );

    /* =====================================================
       ACTIVE LINK
    ===================================================== */

    function setActive(id) {

      let activeLink =
        null;

      tocLinks.forEach(
        (link) => {

          const isActive =

            link.getAttribute(
              "href"
            ) === `#${id}`;

          link.classList.toggle(
            "active",
            isActive
          );

          if (
            isActive
          ) {

            activeLink =
              link;
          }

        }
      );

      /* =========================================
         KEEP ACTIVE VISIBLE
      ========================================= */

      if (
        !activeLink
      ) return;

      activeLink.scrollIntoView({

        block: "nearest",
        behavior: "smooth"

      });

    }

    /* =====================================================
       ACTIVE TRACKING
    ===================================================== */

    function updateActiveHeading() {

      let current =
        headings[0];

      const offset =
        180;

      headings.forEach(
        (heading) => {

          const rect =
            heading.getBoundingClientRect();

          if (
            rect.top <= offset
          ) {

            current =
              heading;
          }

        }
      );

      if (current) {
        setActive(
          current.id
        );
      }

    }

    /* =====================================================
       SCROLL
    ===================================================== */

    let ticking =
      false;

    window.addEventListener(
      "scroll",
      () => {

        if (
          !ticking
        ) {

          window.requestAnimationFrame(
            () => {

              updateActiveHeading();

              ticking =
                false;

            }
          );

          ticking =
            true;
        }

      },

      {

        passive: true

      }

    );

    /* =====================================================
       RESIZE
    ===================================================== */

    window.addEventListener(
      "resize",
      updateActiveHeading
    );

    /* =====================================================
       INITIAL
    ===================================================== */

    updateActiveHeading();

  }
);
</script>
