<!-- =========================================================
     TOC SCRIPT
========================================================= -->

<script>

document.addEventListener(
  "DOMContentLoaded",
  () => {

    const toc =
      document.getElementById(
        "table-of-contents"
      );

    const article =
      document.querySelector(
        ".blog-content article"
      );

    if (
      !toc ||
      !article
    ) return;

    /* =====================================================
       FIND VALID ARTICLE HEADINGS ONLY
    ===================================================== */

    const headings =
      Array.from(

        article.querySelectorAll(
          "h1, h2, h3, h4"
        )

      ).filter(
        (heading) => {

          return !heading.closest(
            `
            .post-item,
            .sidebar-card,
            .hero-section,
            .posts-list,
            .card,
            .notice,
            .callout
            `
          );

        }
      );

    /* =====================================================
       HIDE EMPTY TOC
    ===================================================== */

    if (
      headings.length === 0
    ) {

      toc.parentElement.style.display =
        "none";

      return;
    }

    /* =====================================================
       BUILD TOC
    ===================================================== */

    headings.forEach(
      (
        heading,
        index
      ) => {

        /* ===============================================
           SKIP EMPTY HEADINGS
        =============================================== */

        if (
          !heading.textContent.trim()
        ) return;

        /* ===============================================
           AUTO GENERATE IDS
        =============================================== */

        if (
          !heading.id
        ) {

          heading.id =
            `heading-${index}`;
        }

        /* ===============================================
           CREATE TOC LINK
        =============================================== */

        const link =
          document.createElement(
            "a"
          );

        link.href =
          `#${heading.id}`;

        link.textContent =
          heading.textContent.trim();

        /* ===============================================
           HEADING LEVEL CLASS
        =============================================== */

        const level =
          heading.tagName.toLowerCase();

        link.classList.add(
          `toc-${level}`
        );

        toc.appendChild(
          link
        );

      }
    );

    /* =====================================================
       TOC LINKS
    ===================================================== */

    const tocLinks =
      toc.querySelectorAll(
        "a"
      );

    /* =====================================================
       SET ACTIVE LINK
    ===================================================== */

    const setActiveLink =
      (id) => {

        tocLinks.forEach(
          (link) => {

            link.classList.remove(
              "active"
            );

            if (
              link.getAttribute(
                "href"
              ) === `#${id}`
            ) {

              link.classList.add(
                "active"
              );

            }

          }
        );

      };

    /* =====================================================
       ACTIVE SECTION OBSERVER
    ===================================================== */

    const observer =
      new IntersectionObserver(

        () => {

          let currentHeading =
            null;

          headings.forEach(
            (heading) => {

              const rect =
                heading.getBoundingClientRect();

              if (
                rect.top <= 140
              ) {

                currentHeading =
                  heading.id;

              }

            }
          );

          if (
            currentHeading
          ) {

            setActiveLink(
              currentHeading
            );

          }

        },

        {

          rootMargin:
            "-10% 0px -70% 0px",

          threshold: 0
        }

      );

    /* =====================================================
       OBSERVE HEADINGS
    ===================================================== */

    headings.forEach(
      (heading) => {

        observer.observe(
          heading
        );

      }
    );

    /* =====================================================
       INITIAL ACTIVE STATE
    ===================================================== */

    setTimeout(
      () => {

        setActiveLink(
          headings[0].id
        );

      },
      50
    );

  }
);

</script>
