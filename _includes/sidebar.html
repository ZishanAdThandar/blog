<aside class="sidebar">

  <div class="sidebar-card toc-card">

    <div class="sidebar-heading">

      <i class="fas fa-stream"></i>

      <span>
        On This Page
      </span>

    </div>

    <nav id="table-of-contents"></nav>

  </div>

</aside>


<script>
document.addEventListener(
  "DOMContentLoaded",
  () => {

    /* =====================================================
       ELEMENTS
    ===================================================== */

    const toc =
      document.getElementById(
        "table-of-contents"
      );

    const content =
      document.querySelector(
        ".article-markdown"
      );

    if (
      !toc ||
      !content
    ) return;

    /* =====================================================
       RESET - CLEAR EXISTING TOC
    ===================================================== */
    
    toc.innerHTML = "";

    /* =====================================================
       GET ALL POTENTIAL HEADINGS
    ===================================================== */

    const rawHeadings =
      Array.from(

        content.querySelectorAll(
          "h1, h2, h3, h4"
        )

      );

    /* =====================================================
       FILTER HEADINGS - EXCLUDE CARDS AND DUPLICATES
    ===================================================== */

    const validHeadings = [];

    for (let i = 0; i < rawHeadings.length; i++) {
      const heading = rawHeadings[i];
      const text = heading.textContent.trim();

      /* Skip empty headings */
      if (text.length === 0) continue;

      /* Skip if inside sidebar */
      if (heading.closest(".sidebar")) continue;

      /* Skip if inside toc-ignore */
      if (heading.closest(".toc-ignore")) continue;

      /* Skip if inside related-posts */
      if (heading.closest(".related-posts")) continue;

      /* CRITICAL FIX: Skip if inside post-item OR card */
      if (heading.closest(".post-item")) continue;
      if (heading.closest(".card")) continue;
      if (heading.closest('[class*="card"]')) continue;
      
      /* Skip hidden elements */
      if (heading.offsetParent === null) continue;

      /* CRITICAL FIX: Check if this heading text already exists in validHeadings */
      let isDuplicate = false;
      for (let j = 0; j < validHeadings.length; j++) {
        const existingText = validHeadings[j].textContent.trim();
        if (existingText === text) {
          isDuplicate = true;
          break;
        }
      }
      
      /* Also check if this heading appears very close to same text (within 5 siblings) */
      let nearDuplicate = false;
      for (let k = Math.max(0, i - 10); k < i; k++) {
        if (rawHeadings[k].textContent.trim() === text) {
          nearDuplicate = true;
          break;
        }
      }
      
      if (!isDuplicate && !nearDuplicate) {
        validHeadings.push(heading);
      }
    }

    /* =====================================================
       NO HEADINGS
    ===================================================== */

    if (validHeadings.length === 0) {
      if (toc.parentElement) {
        toc.parentElement.style.display = "none";
      }
      return;
    }

    /* =====================================================
       ASSIGN UNIQUE IDS
    ===================================================== */

    const usedIds = new Set();

    validHeadings.forEach((heading, index) => {
      /* Skip if heading already has a unique ID not used */
      if (heading.id && !usedIds.has(heading.id)) {
        usedIds.add(heading.id);
        return;
      }

      /* Generate base ID from text */
      let baseId = heading.textContent
        .trim()
        .toLowerCase()
        .replace(/[^\w\u4e00-\u9fff]+/g, "-")
        .replace(/^-+|-+$/g, "");

      if (!baseId || baseId.length < 2) {
        baseId = `heading-${index}`;
      }

      /* Ensure uniqueness */
      let finalId = baseId;
      let counter = 1;
      while (usedIds.has(finalId)) {
        finalId = `${baseId}-${counter}`;
        counter++;
      }

      heading.id = finalId;
      usedIds.add(finalId);
    });

    /* =====================================================
       BUILD TOC
    ===================================================== */

    validHeadings.forEach((heading) => {
      const link = document.createElement("a");

      link.href = `#${heading.id}`;
      link.textContent = heading.textContent.trim();
      link.classList.add(`toc-${heading.tagName.toLowerCase()}`);

      /* Click handler */
      link.addEventListener("click", (e) => {
        e.preventDefault();

        const offset = 110;
        const top =
          heading.getBoundingClientRect().top +
          window.pageYOffset -
          offset;

        window.scrollTo({
          top,
          behavior: "smooth"
        });

        history.replaceState(null, "", `#${heading.id}`);
      });

      toc.appendChild(link);
    });

    /* =====================================================
       ACTIVE LINK TRACKING
    ===================================================== */

    const tocLinks = Array.from(toc.querySelectorAll("a"));

    function setActive(id) {
      tocLinks.forEach((link) => {
        const isActive = link.getAttribute("href") === `#${id}`;
        link.classList.toggle("active", isActive);
        
        if (isActive) {
          link.scrollIntoView({
            block: "nearest",
            behavior: "smooth"
          });
        }
      });
    }

    function updateActiveHeading() {
      if (validHeadings.length === 0) return;
      
      let current = validHeadings[0];
      const offset = 180;

      for (let i = 0; i < validHeadings.length; i++) {
        const heading = validHeadings[i];
        const rect = heading.getBoundingClientRect();
        if (rect.top <= offset) {
          current = heading;
        }
      }

      setActive(current.id);
    }

    /* Scroll listener with requestAnimationFrame */
    let ticking = false;
    window.addEventListener("scroll", () => {
      if (!ticking) {
        window.requestAnimationFrame(() => {
          updateActiveHeading();
          ticking = false;
        });
        ticking = true;
      }
    }, { passive: true });

    window.addEventListener("resize", updateActiveHeading);
    
    /* Initial call */
    updateActiveHeading();

    /* =====================================================
       DEBUG LOG (REMOVE IN PRODUCTION)
    ===================================================== */
    console.log("TOC Headings found:", validHeadings.length);
    validHeadings.forEach(h => console.log(" -", h.textContent.trim()));

  }
);
</script>
