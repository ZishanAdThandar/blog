<!-- =========================================================
     TOC SCRIPT
========================================================= -->

<script>

document.addEventListener(
  "DOMContentLoaded",
  () => {

    const toc =
      document.getElementById(
        "table-of-contents"
      );

    const content =
      document.querySelector(
        ".article-content"
      );

    if (
      !toc ||
      !content
    ) return;

    /* =====================================================
       HEADINGS
    ===================================================== */

    const headings =
      Array.from(

        content.querySelectorAll(
          "h1, h2, h3, h4"
        )

      ).filter(
        (heading) => {

          return (
            heading.textContent
              .trim()
              .length > 0
          );

        }
      );

    /* =====================================================
       EMPTY TOC
    ===================================================== */

    if (
      headings.length === 0
    ) {

      toc.parentElement.style.display =
        "none";

      return;
    }

    /* =====================================================
       BUILD TOC
    ===================================================== */

    headings.forEach(
      (
        heading,
        index
      ) => {

        if (
          !heading.id
        ) {

          heading.id =
            `heading-${index}`;
        }

        const link =
          document.createElement(
            "a"
          );

        link.href =
          `#${heading.id}`;

        link.textContent =
          heading.textContent.trim();

        link.classList.add(
          `toc-${heading.tagName.toLowerCase()}`
        );

        toc.appendChild(
          link
        );

      }
    );

    /* =====================================================
       LINKS
    ===================================================== */

    const tocLinks =
      toc.querySelectorAll(
        "a"
      );

    /* =====================================================
       ACTIVE LINK
    ===================================================== */
const setActiveLink =
  (id) => {

    let activeElement =
      null;

    tocLinks.forEach(
      (link) => {

        link.classList.remove(
          "active"
        );

        if (
          link.getAttribute(
            "href"
          ) === `#${id}`
        ) {

          link.classList.add(
            "active"
          );

          activeElement =
            link;

        }

      }
    );

    /* ===============================================
       KEEP ACTIVE LINK VISIBLE
    =============================================== */

    if (
      activeElement
    ) {

      activeElement.scrollIntoView({

        block: "nearest",

        behavior: "smooth"

      });

    }

  };
    /* =====================================================
       ACTIVE HEADING
    ===================================================== */

    const updateActiveHeading =
      () => {

        let currentHeading =
          headings[0];

        headings.forEach(
          (heading) => {

            const rect =
              heading.getBoundingClientRect();

            if (
              rect.top <= 140
            ) {

              currentHeading =
                heading;

            }

          }
        );

        if (
          currentHeading
        ) {

          setActiveLink(
            currentHeading.id
          );

        }

      };

    /* =====================================================
       SCROLL
    ===================================================== */

    window.addEventListener(
      "scroll",
      updateActiveHeading,
      {

        passive: true

      }
    );

    /* =====================================================
       INITIAL
    ===================================================== */

    updateActiveHeading();

  }
);

</script>
