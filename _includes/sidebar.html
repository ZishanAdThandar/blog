<!-- =========================================================
     TOC SCRIPT (SIMPLIFIED & WORKING)
========================================================= -->

<script>
(function() {
  // Wait for everything to load
  function initTOC() {
    var toc = document.getElementById("table-of-contents");
    if (!toc) return;
    
    // Clear any existing content
    toc.innerHTML = "";
    
    // Find all headings inside article content
    var content = document.querySelector(".article-content");
    if (!content) {
      console.log("TOC: .article-content not found");
      return;
    }
    
    // Get all headings
    var headings = content.querySelectorAll("h1, h2, h3, h4");
    if (headings.length === 0) {
      toc.parentElement.style.display = "none";
      return;
    }
    
    // Build TOC links
    for (var i = 0; i < headings.length; i++) {
      var heading = headings[i];
      var text = heading.textContent.trim();
      if (text === "") continue;
      
      // Add ID if missing
      if (!heading.id) {
        heading.id = "heading-" + i;
      }
      
      // Create link
      var link = document.createElement("a");
      link.href = "#" + heading.id;
      link.textContent = text;
      link.className = "toc-" + heading.tagName.toLowerCase();
      
      // Add click handler
      link.onclick = function(e) {
        e.preventDefault();
        var targetId = this.getAttribute("href");
        var target = document.querySelector(targetId);
        if (target) {
          target.scrollIntoView({
            behavior: "smooth",
            block: "start"
          });
          history.pushState(null, null, targetId);
        }
      };
      
      toc.appendChild(link);
    }
    
    // Update active heading on scroll
    var tocLinks = toc.querySelectorAll("a");
    if (tocLinks.length === 0) return;
    
    function updateActive() {
      var scrollPos = window.scrollY + 150; // Offset for sticky header
      var currentId = null;
      
      // Find which heading is currently in view
      for (var i = headings.length - 1; i >= 0; i--) {
        var heading = headings[i];
        var headingTop = heading.offsetTop;
        
        if (headingTop <= scrollPos) {
          currentId = heading.id;
          break;
        }
      }
      
      // If no heading found, use first one
      if (!currentId && headings.length > 0) {
        currentId = headings[0].id;
      }
      
      // Update active class on links
      for (var j = 0; j < tocLinks.length; j++) {
        var link = tocLinks[j];
        link.classList.remove("active");
        if (link.getAttribute("href") === "#" + currentId) {
          link.classList.add("active");
        }
      }
    }
    
    // Listen to scroll events
    window.addEventListener("scroll", updateActive);
    window.addEventListener("resize", updateActive);
    
    // Run once initially
    updateActive();
  }
  
  // Try on DOMContentLoaded
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initTOC);
  } else {
    initTOC();
  }
  
  // Also try after a small delay (in case content loads async)
  setTimeout(initTOC, 100);
})();
</script>
