<!-- =========================================================
     TOC SCRIPT
========================================================= -->

<script>

(function () {

  function initTOC() {

    const toc =
      document.getElementById(
        "table-of-contents"
      );

    if (!toc) return;

    /* =====================================================
       ARTICLE CONTENT ONLY
    ===================================================== */

    const content =
      document.querySelector(
        ".article-content"
      );

    if (!content) return;

    /* =====================================================
       GET HEADINGS
    ===================================================== */

    const headings =
      Array.from(

        content.querySelectorAll(
          "h1, h2, h3, h4"
        )

      ).filter(
        (heading) => {

          return (
            heading.textContent
              .trim()
              .length > 0
          );

        }
      );

    /* =====================================================
       NO HEADINGS
    ===================================================== */

    if (
      headings.length === 0
    ) {

      toc.parentElement.style.display =
        "none";

      return;
    }

    /* =====================================================
       CLEAR OLD TOC
    ===================================================== */

    toc.innerHTML = "";

    /* =====================================================
       BUILD TOC
    ===================================================== */

    headings.forEach(
      (
        heading,
        index
      ) => {

        /* ===============================================
           AUTO ID
        =============================================== */

        if (
          !heading.id
        ) {

          heading.id =
            `toc-heading-${index}`;
        }

        /* ===============================================
           CREATE LINK
        =============================================== */

        const link =
          document.createElement(
            "a"
          );

        link.href =
          `#${heading.id}`;

        link.textContent =
          heading.textContent.trim();

        /* ===============================================
           LEVEL CLASS
        =============================================== */

        link.classList.add(
          `toc-${heading.tagName.toLowerCase()}`
        );

        /* ===============================================
           SMOOTH SCROLL
        =============================================== */

        link.addEventListener(
          "click",
          (e) => {

            e.preventDefault();

            heading.scrollIntoView({

              behavior: "smooth",

              block: "start"

            });

            history.pushState(
              null,
              null,
              `#${heading.id}`
            );

          }
        );

        toc.appendChild(
          link
        );

      }
    );

    /* =====================================================
       TOC LINKS
    ===================================================== */

    const tocLinks =
      toc.querySelectorAll(
        "a"
      );

    /* =====================================================
       ACTIVE LINK
    ===================================================== */

    function updateActive() {

      let currentId =
        headings[0].id;

      headings.forEach(
        (heading) => {

          const rect =
            heading.getBoundingClientRect();

          if (
            rect.top <= 160
          ) {

            currentId =
              heading.id;
          }

        }
      );

tocLinks.forEach(
  (link) => {

    link.classList.remove(
      "active"
    );

    if (
      link.getAttribute(
        "href"
      ) === `#${currentId}`
    ) {

      link.classList.add(
        "active"
      );

    }

  }
);

    }

    /* =====================================================
       EVENTS
    ===================================================== */

    window.addEventListener(
      "scroll",
      updateActive,
      {

        passive: true

      }
    );

    window.addEventListener(
      "resize",
      updateActive
    );

    /* =====================================================
       INITIAL
    ===================================================== */

    updateActive();

  }

  /* =======================================================
     DOM READY
  ======================================================= */

  if (
    document.readyState ===
    "loading"
  ) {

    document.addEventListener(
      "DOMContentLoaded",
      initTOC
    );

  } else {

    initTOC();

  }

})();

</script>
