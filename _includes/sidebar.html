<aside class="sidebar">

  <div class="sidebar-card toc-card">

    <div class="sidebar-heading">

      <i class="fas fa-stream"></i>

      <span>

        On This Page

      </span>

    </div>

    <nav id="table-of-contents"></nav>

  </div>

</aside>

<script>

document.addEventListener(
  "DOMContentLoaded",
  () => {

    const toc =
      document.getElementById(
        "table-of-contents"
      );

    const content =
      document.querySelector(
        ".article-content"
      );

    if (
      !toc ||
      !content
    ) return;

    /* =====================================================
       HEADINGS
    ===================================================== */

    const headings =
      Array.from(

        content.querySelectorAll(
          "h1, h2, h3, h4"
        )

      ).filter(
        (heading) => {

          return (
            heading.textContent
              .trim()
              .length > 0
          );

        }
      );

    if (
      headings.length === 0
    ) {

      toc.parentElement.style.display =
        "none";

      return;
    }

    /* =====================================================
       BUILD TOC
    ===================================================== */

    headings.forEach(
      (
        heading,
        index
      ) => {

        if (
          !heading.id
        ) {

          heading.id =
            `heading-${index}`;
        }

        const link =
          document.createElement(
            "a"
          );

        link.href =
          `#${heading.id}`;

        link.textContent =
          heading.textContent.trim();

        link.classList.add(
          `toc-${heading.tagName.toLowerCase()}`
        );

        /* ===============================================
           CLICK
        =============================================== */

        link.addEventListener(
          "click",
          (e) => {

            e.preventDefault();

            const offset =
              110;

            const top =
              heading
                .getBoundingClientRect()
                .top +
              window.pageYOffset -
              offset;

            window.scrollTo({

              top,
              behavior: "smooth"

            });

            history.replaceState(

              null,
              null,
              `#${heading.id}`

            );

          }
        );

        toc.appendChild(
          link
        );

      }
    );

    /* =====================================================
       TOC LINKS
    ===================================================== */

    const tocLinks =
      toc.querySelectorAll(
        "a"
      );

    /* =====================================================
       SET ACTIVE
    ===================================================== */

    function setActive(id) {

      tocLinks.forEach(
        (link) => {

          link.classList.remove(
            "active"
          );

          if (
            link.getAttribute(
              "href"
            ) === `#${id}`
          ) {

            link.classList.add(
              "active"
            );

            /* =========================================
               KEEP ACTIVE LINK VISIBLE
            ========================================= */

            const linkTop =
              link.offsetTop;

            const linkBottom =
              linkTop +
              link.offsetHeight;

            const tocTop =
              toc.scrollTop;

            const tocBottom =
              tocTop +
              toc.clientHeight;

            if (
              linkBottom >
              tocBottom
            ) {

              toc.scrollTo({

                top:
                  linkBottom -
                  toc.clientHeight +
                  20,

                behavior: "smooth"

              });

            }

            else if (
              linkTop <
              tocTop
            ) {

              toc.scrollTo({

                top:
                  linkTop - 20,

                behavior: "smooth"

              });

            }

          }

        }
      );

    }

    /* =====================================================
       INTERSECTION OBSERVER
    ===================================================== */

    let currentActive =
      headings[0].id;

    const observer =
      new IntersectionObserver(

        (entries) => {

          entries.forEach(
            (entry) => {

              if (
                entry.isIntersecting
              ) {

                currentActive =
                  entry.target.id;

                setActive(
                  currentActive
                );

              }

            }
          );

        },

        {

          rootMargin:
            "-20% 0px -65% 0px",

          threshold: 0

        }

      );

    headings.forEach(
      (heading) => {

        observer.observe(
          heading
        );

      }
    );

    /* =====================================================
       INITIAL
    ===================================================== */

    setActive(
      headings[0].id
    );

  }
);

</script>
