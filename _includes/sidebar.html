<aside class="sidebar">

  <div class="sidebar-card toc-card">

    <div class="sidebar-heading">

      <i class="fas fa-stream"></i>

      <span>
        On This Page
      </span>

    </div>

    <nav id="table-of-contents"></nav>

  </div>

</aside>




<script>
(function() {
  // CRITICAL: Prevent multiple initialization
  if (window.__tocFinalFixed === true) {
    console.log("TOC already initialized, skipping");
    return;
  }
  window.__tocFinalFixed = true;

  function buildTOC() {
    /* =====================================================
       ELEMENTS
    ===================================================== */
    const toc = document.getElementById("table-of-contents");
    const content = document.querySelector(".article-markdown");

    if (!toc || !content) return;

    // Clear existing TOC completely
    toc.innerHTML = "";
    
    // Also check if parent card needs to be shown/hidden
    const sidebarCard = toc.closest('.toc-card');
    
    /* =====================================================
       GET ALL HEADINGS FROM MAIN CONTENT ONLY
       IMPORTANT: querySelectorAll returns LIVE collection
       Convert to array immediately to avoid issues
    ===================================================== */
    const allHeadings = Array.from(content.querySelectorAll("h1, h2, h3, h4"));
    
    /* =====================================================
       STRICT FILTERING - NO EXCEPTIONS
    ===================================================== */
    const validHeadings = [];
    const seenContent = new Set(); // Track by normalized text + parent section
    
    for (let i = 0; i < allHeadings.length; i++) {
      const heading = allHeadings[i];
      const text = heading.textContent.trim();
      
      // Empty text check
      if (text === "") continue;
      
      // CRITICAL: Check if heading is INSIDE any excluded container
      let isExcluded = false;
      
      // List of selectors to exclude completely
      const excludeSelectors = [
        ".sidebar",
        ".toc-ignore", 
        ".related-posts",
        ".post-item",
        ".card",
        "[class*='card']",
        ".comment",
        ".footer",
        ".related",
        ".recommendations",
        ".similar-posts"
      ];
      
      for (let selector of excludeSelectors) {
        if (heading.closest(selector)) {
          isExcluded = true;
          break;
        }
      }
      
      if (isExcluded) continue;
      
      // Hidden element check
      if (heading.offsetParent === null) continue;
      
      // Create unique key for deduplication
      // Include parent article/section context to distinguish same text in different places
      let context = "";
      let parent = heading.parentElement;
      let depth = 0;
      while (parent && parent !== content && depth < 4) {
        if (parent.id) {
          context = parent.id + "|" + context;
          break;
        }
        if (parent.classList && parent.classList.length > 0) {
          context = parent.classList[0] + "|" + context;
        }
        parent = parent.parentElement;
        depth++;
      }
      
      const normalizedText = text.toLowerCase().replace(/\s+/g, ' ').trim();
      const uniqueKey = `${context}|${normalizedText}`;
      
      // Skip if we've seen this exact heading in same context
      if (seenContent.has(uniqueKey)) {
        continue;
      }
      
      // Also check for sequential duplicates (same heading appears back-to-back)
      if (i > 0 && allHeadings[i-1].textContent.trim().toLowerCase() === normalizedText) {
        continue;
      }
      
      seenContent.add(uniqueKey);
      validHeadings.push(heading);
    }
    
    /* =====================================================
       NO HEADINGS FOUND
    ===================================================== */
    if (validHeadings.length === 0) {
      if (sidebarCard) {
        sidebarCard.style.display = "none";
      }
      return;
    }
    
    /* =====================================================
       SHOW THE TOC CARD IF IT WAS HIDDEN
    ===================================================== */
    if (sidebarCard) {
      sidebarCard.style.display = "";
    }
    
    /* =====================================================
       ASSIGN UNIQUE IDs - MORE ROBUST
    ===================================================== */
    const usedIds = new Set();
    
    for (let i = 0; i < validHeadings.length; i++) {
      const heading = validHeadings[i];
      
      // If heading already has a unique ID, use it
      if (heading.id && heading.id.trim() !== "" && !usedIds.has(heading.id)) {
        usedIds.add(heading.id);
        continue;
      }
      
      // Generate clean ID from text
      let baseId = heading.textContent
        .trim()
        .toLowerCase()
        // Replace any non-word character with hyphen
        .replace(/[^\w\u4e00-\u9fff\u3040-\u309f\u30a0-\u30ff]+/g, "-")
        // Remove leading/trailing hyphens
        .replace(/^-+|-+$/g, "");
      
      // Fallback if empty
      if (!baseId || baseId.length === 0) {
        baseId = `toc-section`;
      }
      
      // Ensure uniqueness
      let finalId = baseId;
      let counter = 1;
      while (usedIds.has(finalId)) {
        finalId = `${baseId}-${counter}`;
        counter++;
      }
      
      heading.id = finalId;
      usedIds.add(finalId);
    }
    
    /* =====================================================
       BUILD TOC LINKS
    ===================================================== */
    for (let i = 0; i < validHeadings.length; i++) {
      const heading = validHeadings[i];
      const link = document.createElement("a");
      
      link.href = `#${heading.id}`;
      link.textContent = heading.textContent.trim();
      link.classList.add(`toc-${heading.tagName.toLowerCase()}`);
      
      // Click handler with proper scroll
      link.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        
        const targetId = link.getAttribute("href").substring(1);
        const targetElement = document.getElementById(targetId);
        
        if (targetElement) {
          const offset = 110;
          const elementPosition = targetElement.getBoundingClientRect().top;
          const offsetPosition = elementPosition + window.pageYOffset - offset;
          
          window.scrollTo({
            top: offsetPosition,
            behavior: "smooth"
          });
          
          // Update URL without jumping
          history.replaceState(null, "", `#${targetId}`);
        }
      });
      
      toc.appendChild(link);
    }
    
    /* =====================================================
       ACTIVE LINK HIGHLIGHTING
    ===================================================== */
    const tocLinks = Array.from(toc.querySelectorAll("a"));
    
    function setActiveLink(id) {
      for (let i = 0; i < tocLinks.length; i++) {
        const link = tocLinks[i];
        const href = link.getAttribute("href");
        const isActive = (href === `#${id}`);
        
        if (isActive) {
          link.classList.add("active");
          // Scroll active link into view smoothly
          link.scrollIntoView({ block: "nearest", behavior: "smooth" });
        } else {
          link.classList.remove("active");
        }
      }
    }
    
    function updateActiveHeading() {
      if (validHeadings.length === 0) return;
      
      let currentId = validHeadings[0].id;
      const offset = 180;
      
      // Find the last heading that is above the scroll position
      for (let i = validHeadings.length - 1; i >= 0; i--) {
        const heading = validHeadings[i];
        const rect = heading.getBoundingClientRect();
        if (rect.top <= offset) {
          currentId = heading.id;
          break;
        }
      }
      
      setActiveLink(currentId);
    }
    
    // Throttled scroll handler
    let scrollTimeout = null;
    window.addEventListener("scroll", () => {
      if (scrollTimeout) {
        window.cancelAnimationFrame(scrollTimeout);
      }
      scrollTimeout = window.requestAnimationFrame(() => {
        updateActiveHeading();
        scrollTimeout = null;
      });
    }, { passive: true });
    
    window.addEventListener("resize", () => {
      updateActiveHeading();
    });
    
    // Initial highlight
    setTimeout(updateActiveHeading, 100);
    
    // Handle hash in URL on load
    if (window.location.hash) {
      setTimeout(() => {
        const hashId = window.location.hash.substring(1);
        const targetElement = document.getElementById(hashId);
        if (targetElement) {
          const offset = 110;
          const elementPosition = targetElement.getBoundingClientRect().top;
          const offsetPosition = elementPosition + window.pageYOffset - offset;
          window.scrollTo({ top: offsetPosition, behavior: "smooth" });
        }
      }, 150);
    }
  }
  
  // Wait for DOM to be ready
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", buildTOC);
  } else {
    buildTOC();
  }
})();
</script>
