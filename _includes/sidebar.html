<aside class="sidebar">

  <div class="sidebar-card toc-card">

    <div class="sidebar-heading">

      <i class="fas fa-stream"></i>

      <span>
        On This Page
      </span>

    </div>

    <nav id="table-of-contents"></nav>

  </div>

</aside>

<script>

document.addEventListener(
  "DOMContentLoaded",
  () => {

    /* =====================================================
       ELEMENTS
    ===================================================== */

    const toc =
      document.getElementById(
        "table-of-contents"
      );

    const content =
      document.querySelector(
        ".article-markdown"
      );

    if (
      !toc ||
      !content
    ) return;

    /* =====================================================
       FIND HEADINGS
    ===================================================== */

    const headingElements =
      content.querySelectorAll(
        "h1, h2, h3, h4"
      );

    /* =====================================================
       CLEAN HEADINGS
    ===================================================== */

    const headings =
      Array.from(
        headingElements
      ).filter(
        (heading) => {

          /* =========================================
             EMPTY
          ========================================= */

          const text =
            heading.textContent
              .trim();

          if (
            text.length === 0
          ) {

            return false;
          }

          /* =========================================
             IGNORE SIDEBAR
          ========================================= */

          if (
            heading.closest(
              ".sidebar"
            )
          ) {

            return false;
          }

          /* =========================================
             IGNORE TOC-IGNORE
          ========================================= */

          if (
            heading.closest(
              ".toc-ignore"
            )
          ) {

            return false;
          }

          /* =========================================
             IGNORE HIDDEN
          ========================================= */

          if (
            heading.offsetParent === null
          ) {

            return false;
          }

          return true;

        }
      );

    /* =====================================================
       NO HEADINGS
    ===================================================== */

    if (
      headings.length === 0
    ) {

      toc.parentElement.style.display =
        "none";

      return;
    }

    /* =====================================================
       UNIQUE IDS
    ===================================================== */

    headings.forEach(
      (
        heading,
        index
      ) => {

        const baseId =

          heading.id ||

          heading.textContent
            .trim()
            .toLowerCase()
            .replace(/[^\w]+/g, "-")
            .replace(/^-+|-+$/g, "");

        heading.id =
          `${baseId}-${index}`;

      }
    );

    /* =====================================================
       CLEAR TOC
    ===================================================== */

    toc.innerHTML = "";

    /* =====================================================
       BUILD TOC
    ===================================================== */

    headings.forEach(
      (
        heading
      ) => {

        const link =
          document.createElement(
            "a"
          );

        link.href =
          `#${heading.id}`;

        link.textContent =
          heading.textContent
            .trim();

        link.classList.add(
          `toc-${heading.tagName.toLowerCase()}`
        );

        /* ===============================================
           CLICK
        =============================================== */

        link.addEventListener(
          "click",
          (e) => {

            e.preventDefault();

            const offset =
              110;

            const top =

              heading.getBoundingClientRect().top +

              window.pageYOffset -

              offset;

            window.scrollTo({

              top,
              behavior: "smooth"

            });

            history.replaceState(

              null,
              null,
              `#${heading.id}`

            );

          }
        );

        toc.appendChild(
          link
        );

      }
    );

    /* =====================================================
       TOC LINKS
    ===================================================== */

    const tocLinks =
      Array.from(
        toc.querySelectorAll(
          "a"
        )
      );

    /* =====================================================
       SET ACTIVE
    ===================================================== */

    function setActive(id) {

      let activeLink =
        null;

      tocLinks.forEach(
        (link) => {

          const isActive =

            link.getAttribute(
              "href"
            ) === `#${id}`;

          link.classList.toggle(
            "active",
            isActive
          );

          if (
            isActive
          ) {

            activeLink =
              link;
          }

        }
      );

      /* ===============================================
         KEEP ACTIVE LINK VISIBLE
      =============================================== */

      if (
        !activeLink
      ) return;

      const linkTop =
        activeLink.offsetTop;

      const linkBottom =
        linkTop +
        activeLink.offsetHeight;

      const visibleTop =
        toc.scrollTop;

      const visibleBottom =
        visibleTop +
        toc.clientHeight;

      /* ===============================================
         BELOW VIEW
      =============================================== */

      if (
        linkBottom >
        visibleBottom - 20
      ) {

        toc.scrollTop =

          linkBottom -

          toc.clientHeight +

          40;
      }

      /* ===============================================
         ABOVE VIEW
      =============================================== */

      else if (
        linkTop <
        visibleTop + 20
      ) {

        toc.scrollTop =
          linkTop - 40;
      }

    }

    /* =====================================================
       ACTIVE TRACKING
    ===================================================== */

    function updateActiveHeading() {

      let current =
        headings[0];

      const viewportOffset =
        180;

      headings.forEach(
        (heading) => {

          const rect =
            heading.getBoundingClientRect();

          if (
            rect.top <=
            viewportOffset
          ) {

            current =
              heading;
          }

        }
      );

      setActive(
        current.id
      );

    }

    /* =====================================================
       SCROLL EVENT
    ===================================================== */

    let ticking =
      false;

    window.addEventListener(
      "scroll",
      () => {

        if (
          !ticking
        ) {

          window.requestAnimationFrame(
            () => {

              updateActiveHeading();

              ticking =
                false;

            }
          );

          ticking =
            true;
        }

      },

      {

        passive: true

      }

    );

    /* =====================================================
       RESIZE
    ===================================================== */

    window.addEventListener(
      "resize",
      updateActiveHeading
    );

    /* =====================================================
       INITIAL
    ===================================================== */

    updateActiveHeading();

  }
);

</script>
