<!-- =========================================================
     TOC SCRIPT
========================================================= -->

<script>

document.addEventListener(
  "DOMContentLoaded",
  () => {

    const toc =
      document.getElementById(
        "table-of-contents"
      );

    const article =
      document.querySelector(
        ".blog-content article"
      );

    if (
      !toc ||
      !article
    ) return;

    /* =====================================================
       GET HEADINGS
    ===================================================== */

    const allHeadings =
      article.querySelectorAll(
        "h1, h2, h3, h4"
      );

    /* =====================================================
       FILTER UI HEADINGS
    ===================================================== */

    const headings =
      Array.from(
        allHeadings
      ).filter(
        (heading) => {

          const text =
            heading.textContent
              .trim();

          /* ===============================================
             SKIP EMPTY
          =============================================== */

          if (
            !text
          ) {

            return false;
          }

          /* ===============================================
             SKIP UI HEADINGS
          =============================================== */

          const invalidTexts = [

            "On This Page",

            "Research",

            "Labs",

            "Bug Bounty",

            "Resources"

          ];

          if (
            invalidTexts.includes(
              text
            )
          ) {

            return false;
          }

          return true;

        }
      );

    /* =====================================================
       HIDE EMPTY TOC
    ===================================================== */

    if (
      headings.length === 0
    ) {

      toc.parentElement.style.display =
        "none";

      return;
    }

    /* =====================================================
       BUILD TOC
    ===================================================== */

    headings.forEach(
      (
        heading,
        index
      ) => {

        /* ===============================================
           AUTO ID
        =============================================== */

        if (
          !heading.id
        ) {

          heading.id =
            `heading-${index}`;
        }

        /* ===============================================
           CREATE LINK
        =============================================== */

        const link =
          document.createElement(
            "a"
          );

        link.href =
          `#${heading.id}`;

        link.textContent =
          heading.textContent.trim();

        /* ===============================================
           LEVEL CLASS
        =============================================== */

        const level =
          heading.tagName
            .toLowerCase();

        link.classList.add(
          `toc-${level}`
        );

        toc.appendChild(
          link
        );

      }
    );

    /* =====================================================
       TOC LINKS
    ===================================================== */

    const tocLinks =
      toc.querySelectorAll(
        "a"
      );

    /* =====================================================
       ACTIVE LINK
    ===================================================== */

    const setActiveLink =
      (id) => {

        tocLinks.forEach(
          (link) => {

            link.classList.remove(
              "active"
            );

            if (
              link.getAttribute(
                "href"
              ) === `#${id}`
            ) {

              link.classList.add(
                "active"
              );

            }

          }
        );

      };

    /* =====================================================
       ACTIVE SECTION TRACKING
    ===================================================== */

    const updateActiveHeading =
      () => {

        let currentHeading =
          headings[0];

        headings.forEach(
          (heading) => {

            const rect =
              heading.getBoundingClientRect();

            if (
              rect.top <= 140
            ) {

              currentHeading =
                heading;

            }

          }
        );

        if (
          currentHeading
        ) {

          setActiveLink(
            currentHeading.id
          );

        }

      };

    /* =====================================================
       SCROLL LISTENER
    ===================================================== */

    window.addEventListener(
      "scroll",
      updateActiveHeading,
      {

        passive: true

      }
    );

    /* =====================================================
       INITIAL ACTIVE
    ===================================================== */

    updateActiveHeading();

  }
);

</script>
