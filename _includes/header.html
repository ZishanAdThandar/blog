          ZISHAN

            HACK

          </span>

        </span>

      </a>

      <!-- =========================================================
           MOBILE TOGGLE
      ========================================================= -->

      <button
        class="nav-toggle"
        id="navToggle"
        aria-label="Toggle navigation"
      >

        <i class="fas fa-bars"></i>

      </button>

      <!-- =========================================================
           NAV MENU
      ========================================================= -->

      <div
        class="nav-menu"
        id="navMenu"
      >

        <!-- =========================================================

        ========================================================= -->

        <div class="search-container">

          <input
            type="text"

            placeholder="Search techniques, payloads, writeups..."
            autocomplete="off"
          >

          <div id="search-results"></div>

        </div>

        <!-- =========================================================
             LABS
        ========================================================= -->
<div class="nav-dropdown">

  <button
    type="button"
    class="nav-link dropdown-toggle"
    id="labsToggle"
  >

    <span>

      <i class="fas fa-terminal"></i>

      Labs

    </span>

    <i class="fas fa-chevron-down"></i>

  </button>

  <div
    class="dropdown-menu"
    id="labsMenu"
  >

    <div class="dropdown-menu-inner">

      <a href="{{ site.baseurl }}/labs/htb/">

        <i class="fas fa-cube"></i>

        Hack The Box

      </a>

      <a href="{{ site.baseurl }}/labs/thm/">

        <i class="fas fa-network-wired"></i>

        TryHackMe

      </a>

      <a href="{{ site.baseurl }}/labs/offsec/">

        <i class="fas fa-user-secret"></i>

        OffSec

      </a>

      <a href="{{ site.baseurl }}/labs/vulnhub/">

      </a>

  </div>

</div>

        <!-- =========================================================

        ========================================================= -->

        <a

        >

        <!-- =========================================================

<!-- =========================================================
     NAVBAR SCRIPT
========================================================= -->
<script>

document.addEventListener(
  "DOMContentLoaded",
  function () {

    const navToggle =
      document.getElementById(
        "navToggle"
      );

    const navMenu =
      document.getElementById(
        "navMenu"
      );

    const labsToggle =
      document.getElementById(
        "labsToggle"
      );

    const labsMenu =
      document.getElementById(
        "labsMenu"
      );

    /* =========================================================
       MOBILE NAV
    ========================================================= */

    if (
      navToggle &&
      navMenu
    ) {

      navToggle.addEventListener(
        "click",
        function (e) {

          e.stopPropagation();

          navMenu.classList.toggle(
            "show"
          );

        }
      );

    }

    /* =========================================================
       MOBILE LABS DROPDOWN
    ========================================================= */

    if (
      labsToggle &&
      labsMenu
    ) {

      labsToggle.addEventListener(
        "click",
        function (e) {

          if (
            window.innerWidth <= 900
          ) {

            e.preventDefault();

            e.stopPropagation();

            labsMenu.classList.toggle(
              "show"
            );

          }

        }
      );

    }

    /* =========================================================
       CLOSE OUTSIDE
    ========================================================= */

    document.addEventListener(
      "click",
      function (e) {

        if (
          window.innerWidth <= 900
        ) {

          if (
            navMenu &&
            !navMenu.contains(e.target) &&
            !navToggle.contains(e.target)
          ) {

            navMenu.classList.remove(
              "show"
            );

          }

          if (
            labsMenu &&
            !labsMenu.contains(e.target) &&
            !labsToggle.contains(e.target)
          ) {

            labsMenu.classList.remove(
              "show"
            );

          }

        }

      }
    );

  }
);

</script>
