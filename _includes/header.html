<!-- Navigation Script - Simplified -->
<script>
document.addEventListener("DOMContentLoaded", function() {
  // Mobile menu toggle
  const navToggle = document.getElementById("navToggle");
  const navMenu = document.getElementById("navMenu");
  
  if (navToggle && navMenu) {
    navToggle.addEventListener("click", function(e) {
      e.stopPropagation();
      navMenu.classList.toggle("show");
    });
  }
  
  // Dropdown functionality - Simplified
  const dropdownToggle = document.getElementById("ctfDropdownToggle");
  const dropdownMenu = document.getElementById("ctfDropdownMenu");
  
  if (dropdownToggle && dropdownMenu) {
    // Toggle on click
    dropdownToggle.addEventListener("click", function(e) {
      e.preventDefault();
      e.stopPropagation();
      
      // Close other dropdowns first
      document.querySelectorAll('.dropdown-menu.show').forEach(menu => {
        if (menu !== dropdownMenu) {
          menu.classList.remove('show');
        }
      });
      
      // Toggle current dropdown
      dropdownMenu.classList.toggle("show");
      
      // Rotate arrow
      const arrow = this.querySelector('.dropdown-arrow');
      if (arrow) {
        arrow.style.transform = dropdownMenu.classList.contains("show") ? 'rotate(180deg)' : 'rotate(0)';
      }
    });
    
    // Close when clicking outside
    document.addEventListener("click", function(e) {
      if (!dropdownToggle.contains(e.target) && !dropdownMenu.contains(e.target)) {
        dropdownMenu.classList.remove("show");
        const arrow = dropdownToggle.querySelector('.dropdown-arrow');
        if (arrow) arrow.style.transform = 'rotate(0)';
      }
    });
    
    // Close when clicking a dropdown link
    dropdownMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', function() {
        dropdownMenu.classList.remove("show");
        const arrow = dropdownToggle.querySelector('.dropdown-arrow');
        if (arrow) arrow.style.transform = 'rotate(0)';
        
        // Close mobile menu if open
        if (window.innerWidth <= 768 && navMenu && navMenu.classList.contains('show')) {
          navMenu.classList.remove('show');
        }
      });
    });
  }
  
  // Close mobile menu when clicking a nav link
  document.querySelectorAll('.nav-menu a:not(.dropdown-toggle)').forEach(link => {
    link.addEventListener('click', function() {
      if (window.innerWidth <= 768 && navMenu && navMenu.classList.contains('show')) {
        navMenu.classList.remove('show');
      }
    });
  });
  
  // Handle window resize
  window.addEventListener('resize', function() {
    if (window.innerWidth > 768 && navMenu && navMenu.classList.contains('show')) {
      navMenu.classList.remove('show');
    }
    
    // Reset dropdown on resize
    if (dropdownMenu && dropdownMenu.classList.contains('show')) {
      dropdownMenu.classList.remove('show');
      const arrow = document.querySelector('.dropdown-arrow');
      if (arrow) arrow.style.transform = 'rotate(0)';
    }
  });
});
</script>
