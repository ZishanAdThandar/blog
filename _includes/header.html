<!-- =========================
     HEADER
========================= -->

<header class="header">

  <div class="container">

    <nav class="navbar">

      <!-- LOGO -->

      <div class="nav-brand">

        <a
          href="{{ site.baseurl }}/"
          class="logo"
        >

          <i class="fas fa-shield-halved"></i>

          <span>
            ZISHAN
            <span class="logo-highlight">
              HACK
            </span>
          </span>

        </a>

      </div>

      <!-- MOBILE TOGGLE -->

      <button
        class="nav-toggle"
        id="navToggle"
        aria-label="Toggle navigation"
      >

        <i class="fas fa-bars"></i>

      </button>

      <!-- NAVIGATION -->

      <div
        class="nav-menu"
        id="navMenu"
      >

        <!-- SEARCH -->

        <div class="search-container">

          <input
            type="text"
            id="search-input"
            placeholder="Search techniques, payloads, writeups..."
            autocomplete="off"
          >

          <div id="search-results"></div>

        </div>

        <!-- CTF DROPDOWN -->

        <div class="nav-dropdown">

          <a
            href="#"
            class="nav-link dropdown-toggle"
            id="ctfToggle"
          >

            <i class="fas fa-terminal"></i>

            Labs

            <i class="fas fa-chevron-down"></i>

          </a>

          <div
            class="dropdown-menu"
            id="ctfMenu"
          >

            <a href="{{ site.baseurl }}/posts/hackthebox/">

              <i class="fas fa-cube"></i>

              HackTheBox

            </a>

            <a href="{{ site.baseurl }}/posts/tryhackme/">

              <i class="fas fa-network-wired"></i>

              TryHackMe

            </a>

            <a href="{{ site.baseurl }}/posts/offsec/">

              <i class="fas fa-user-secret"></i>

              OffSec

            </a>

            <a href="{{ site.baseurl }}/posts/vulnhub/">

              <i class="fas fa-server"></i>

              VulnHub

            </a>

          </div>

        </div>

        <!-- ARTICLES -->

        <a
          href="{{ site.baseurl }}/posts/blog/"
          class="nav-link"
        >

          <i class="fas fa-book"></i>

          Research

        </a>

        <!-- BUG BOUNTY -->

        <a
          href="{{ site.baseurl }}/posts/bugbounty/"
          class="nav-link"
        >

          <i class="fas fa-bug"></i>

          Bug Bounty

        </a>

        <!-- ABOUT -->

        <a
          href="{{ site.portfolio }}"
          class="nav-link"
        >

          <i class="fas fa-user"></i>

          About

        </a>

        <!-- CTA -->

        <a
          href="https://zishanhack.com/#resources"
          class="btn btn-premium"
        >

          <i class="fas fa-book-open"></i>

          Resources

        </a>

      </div>

    </nav>

  </div>

</header>

<!-- =========================
     HEADER SCRIPT
========================= -->

<script>

document.addEventListener(
  "DOMContentLoaded",
  function () {

    const navToggle =
      document.getElementById(
        "navToggle"
      );

    const navMenu =
      document.getElementById(
        "navMenu"
      );

    const ctfToggle =
      document.getElementById(
        "ctfToggle"
      );

    const ctfMenu =
      document.getElementById(
        "ctfMenu"
      );

    /* =========================
       MOBILE MENU
    ========================= */

    if (
      navToggle &&
      navMenu
    ) {

      navToggle.addEventListener(
        "click",
        function () {

          navMenu.classList.toggle(
            "show"
          );

        }
      );

    }

    /* =========================
       DROPDOWN
    ========================= */

    if (
      ctfToggle &&
      ctfMenu
    ) {

      ctfToggle.addEventListener(
        "click",
        function (e) {

          e.preventDefault();

          ctfMenu.classList.toggle(
            "show"
          );

        }
      );

      document.addEventListener(
        "click",
        function (e) {

          if (
            !ctfToggle.contains(
              e.target
            ) &&
            !ctfMenu.contains(
              e.target
            )
          ) {

            ctfMenu.classList.remove(
              "show"
            );

          }

        }
      );

    }

  }
);

</script>
