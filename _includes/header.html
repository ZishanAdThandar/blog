<!-- Navigation Script -->
<script>
document.addEventListener("DOMContentLoaded", function() {
  // Mobile menu toggle
  const navToggle = document.getElementById("navToggle");
  const navMenu = document.getElementById("navMenu");
  
  if (navToggle && navMenu) {
    navToggle.addEventListener("click", function(e) {
      e.stopPropagation();
      navMenu.classList.toggle("show");
      this.setAttribute("aria-expanded", navMenu.classList.contains("show"));
    });
  }
  
  // Dropdown functionality
  const dropdownBtn = document.getElementById("ctfBtn");
  const dropdown = document.getElementById("ctfDropdown");
  
  if (dropdownBtn && dropdown) {
    dropdownBtn.addEventListener("click", function(e) {
      e.stopPropagation();
      dropdown.classList.toggle("open");
      
      // Close other dropdowns if any
      const icon = this.querySelector('.fa-chevron-down');
      if (icon) {
        icon.style.transform = dropdown.classList.contains("open") ? 'rotate(180deg)' : 'rotate(0)';
      }
    });
  }
  
  // Close dropdown when clicking outside
  document.addEventListener("click", function(e) {
    if (dropdown && !dropdown.contains(e.target) && !dropdownBtn?.contains(e.target)) {
      dropdown.classList.remove("open");
      const icon = dropdownBtn?.querySelector('.fa-chevron-down');
      if (icon) icon.style.transform = 'rotate(0)';
    }
    
    // Close mobile menu when clicking outside on mobile
    if (window.innerWidth <= 768 && navMenu && navToggle && 
        !navMenu.contains(e.target) && !navToggle.contains(e.target) && 
        navMenu.classList.contains('show')) {
      navMenu.classList.remove('show');
      navToggle.setAttribute('aria-expanded', 'false');
    }
  });
  
  // Close dropdown when clicking a link inside it
  if (dropdown) {
    dropdown.querySelectorAll('a').forEach(function(link) {
      link.addEventListener('click', function() {
        dropdown.classList.remove("open");
        const icon = dropdownBtn?.querySelector('.fa-chevron-down');
        if (icon) icon.style.transform = 'rotate(0)';
        
        // Close mobile menu too if open
        if (window.innerWidth <= 768 && navMenu && navMenu.classList.contains('show')) {
          navMenu.classList.remove('show');
          navToggle?.setAttribute('aria-expanded', 'false');
        }
      });
    });
  }
  
  // Close mobile menu when clicking any nav link
  document.querySelectorAll('.nav-menu a').forEach(function(link) {
    link.addEventListener('click', function() {
      if (window.innerWidth <= 768 && navMenu && navMenu.classList.contains('show')) {
        navMenu.classList.remove('show');
        navToggle?.setAttribute('aria-expanded', 'false');
      }
    });
  });
  
  // Handle window resize
  window.addEventListener('resize', function() {
    if (window.innerWidth > 768 && navMenu && navMenu.classList.contains('show')) {
      navMenu.classList.remove('show');
      navToggle?.setAttribute('aria-expanded', 'false');
    }
  });
  
  // Add focus styles for accessibility
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      document.body.classList.add('keyboard-navigation');
    }
  });
  
  document.addEventListener('mousedown', function() {
    document.body.classList.remove('keyboard-navigation');
  });
});
</script>
