<header class="header">

  <div class="container">

    <nav class="navbar">

      <!-- =========================================================
           LOGO
      ========================================================= -->

      <a
        href="/"
        class="logo"
      >

        <i class="fas fa-shield-halved"></i>

        <span>

          ZISHAN

          <span class="logo-highlight">

            HACK

          </span>

        </span>

      </a>

      <!-- =========================================================
           MOBILE TOGGLE
      ========================================================= -->

      <button
        class="nav-toggle"
        id="navToggle"
        aria-label="Toggle navigation"
      >

        <i class="fas fa-bars"></i>

      </button>

      <!-- =========================================================
           NAV MENU
      ========================================================= -->

      <div
        class="nav-menu"
        id="navMenu"
      >

        <!-- =========================================================
             SEARCH
        ========================================================= -->

        <div class="search-container">

          <input
            type="text"
            id="search-input"
            placeholder="Search techniques, payloads, writeups..."
            autocomplete="off"
          >

          <div id="search-results"></div>

        </div>

        <!-- =========================================================
             LABS
        ========================================================= -->

        <div class="nav-dropdown">

          <a
            href="#"
            class="nav-link dropdown-toggle"
            id="labsToggle"
          >

            <i class="fas fa-terminal"></i>

            Labs

            <i class="fas fa-chevron-down"></i>

          </a>

          <div
            class="dropdown-menu"
            id="labsMenu"
          >

            <a href="{{ site.baseurl }}/labs/htb/">

              <i class="fas fa-cube"></i>

              Hack The Box

            </a>

            <a href="{{ site.baseurl }}/labs/thm/">

              <i class="fas fa-network-wired"></i>

              TryHackMe

            </a>

            <a href="{{ site.baseurl }}/labs/offsec/">

              <i class="fas fa-user-secret"></i>

              OffSec

            </a>

            <a href="{{ site.baseurl }}/labs/vulnhub/">

              <i class="fas fa-server"></i>

              VulnHub

            </a>

          </div>

        </div>

        <!-- =========================================================
             RESEARCH
        ========================================================= -->

        <a
          href="{{ site.baseurl }}/research/"
          class="nav-link"
        >

          <i class="fas fa-book"></i>

          Research

        </a>

        <!-- =========================================================
             BUG BOUNTY
        ========================================================= -->

        <a
          href="{{ site.baseurl }}/bug-bounty/"
          class="nav-link"
        >

          <i class="fas fa-bug"></i>

          Bug Bounty

        </a>

        <!-- =========================================================
             ABOUT
        ========================================================= -->

        <a
          href="{{ site.portfolio }}"
          class="nav-link"
        >

          <i class="fas fa-user"></i>

          About

        </a>

        <!-- =========================================================
             CTA
        ========================================================= -->

        <a
          href="https://zishanhack.com/#resources"
          class="btn btn-premium"
        >

          <i class="fas fa-book-open"></i>

          Resources

        </a>

      </div>

    </nav>

  </div>

</header>

<!-- =========================================================
     HEADER SCRIPT
========================================================= -->

<script>

document.addEventListener(
  "DOMContentLoaded",
  function () {

    const navToggle =
      document.getElementById(
        "navToggle"
      );

    const navMenu =
      document.getElementById(
        "navMenu"
      );

    const labsToggle =
      document.getElementById(
        "labsToggle"
      );

    const labsMenu =
      document.getElementById(
        "labsMenu"
      );

    /* =========================================================
         MOBILE MENU
    ========================================================= */

    if (
      navToggle &&
      navMenu
    ) {

      navToggle.addEventListener(
        "click",
        function () {

          navMenu.classList.toggle(
            "show"
          );

        }
      );

    }

    /* =========================================================
         LABS DROPDOWN
    ========================================================= */

    if (
      labsToggle &&
      labsMenu
    ) {

      labsToggle.addEventListener(
        "click",
        function (e) {

          e.preventDefault();

          labsMenu.classList.toggle(
            "show"
          );

        }
      );

      document.addEventListener(
        "click",
        function (e) {

          if (
            !labsToggle.contains(
              e.target
            ) &&
            !labsMenu.contains(
              e.target
            )
          ) {

            labsMenu.classList.remove(
              "show"
            );

          }

        }
      );

    }

  }
);

</script>
