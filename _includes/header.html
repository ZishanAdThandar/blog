<!-- Responsive Navigation Script -->
<script>
document.addEventListener("DOMContentLoaded", function() {
  const navToggle = document.getElementById("navToggle");
  const navMenu = document.getElementById("navMenu");
  const ctfToggle = document.getElementById("ctfToggle");
  const ctfMenu = document.getElementById("ctfMenu");
  let isMobile = window.innerWidth <= 768;
  
  // Mobile menu toggle
  if (navToggle && navMenu) {
    navToggle.addEventListener("click", function(e) {
      e.stopPropagation();
      navMenu.classList.toggle("show");
      
      // Close dropdown when closing mobile menu
      if (!navMenu.classList.contains("show") && ctfMenu) {
        ctfMenu.classList.remove("show");
        updateArrow(false);
      }
    });
  }
  
  // Dropdown functionality - responsive
  if (ctfToggle && ctfMenu) {
    ctfToggle.addEventListener("click", function(e) {
      e.preventDefault();
      e.stopPropagation();
      
      if (isMobile) {
        // Mobile: Simple toggle
        ctfMenu.classList.toggle("show");
        updateArrow(ctfMenu.classList.contains("show"));
      } else {
        // Desktop: Close other dropdowns first
        document.querySelectorAll('.dropdown-menu.show').forEach(menu => {
          if (menu !== ctfMenu) menu.classList.remove('show');
        });
        
        ctfMenu.classList.toggle("show");
        updateArrow(ctfMenu.classList.contains("show"));
      }
    });
    
    // Update arrow helper
    function updateArrow(show) {
      const arrow = ctfToggle.querySelector('.dropdown-arrow');
      if (arrow) {
        arrow.style.transform = show ? 'rotate(180deg)' : 'rotate(0)';
      }
    }
    
    // Close when clicking outside
    document.addEventListener("click", function(e) {
      if (!ctfToggle.contains(e.target) && !ctfMenu.contains(e.target)) {
        ctfMenu.classList.remove("show");
        updateArrow(false);
      }
    });
    
    // Close when clicking a dropdown link
    ctfMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', function() {
        ctfMenu.classList.remove("show");
        updateArrow(false);
        
        // Close mobile menu if open
        if (isMobile && navMenu && navMenu.classList.contains('show')) {
          navMenu.classList.remove('show');
        }
      });
    });
  }
  
  // Close mobile menu when clicking any nav link
  document.querySelectorAll('.nav-menu a:not(.dropdown-toggle)').forEach(link => {
    link.addEventListener('click', function() {
      if (window.innerWidth <= 768 && navMenu && navMenu.classList.contains('show')) {
        navMenu.classList.remove('show');
      }
    });
  });
  
  // Handle window resize
  window.addEventListener('resize', function() {
    isMobile = window.innerWidth <= 768;
    
    if (window.innerWidth > 768 && navMenu && navMenu.classList.contains('show')) {
      navMenu.classList.remove('show');
    }
    
    // Reset dropdown on resize
    if (ctfMenu && ctfMenu.classList.contains('show')) {
      ctfMenu.classList.remove('show');
      updateArrow(false);
    }
  });
});
</script>
