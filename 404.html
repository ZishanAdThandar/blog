<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta

<title>
404 — Resource Not Found
</title>

<link
rel="stylesheet"
href="{{ '/assets/css/style.css' | relative_url }}"
>

rel="preconnect"
href="https://fonts.googleapis.com"
>

<link

href="https://fonts.gstatic.com"
crossorigin
>

rel="stylesheet"
>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
>

<style>

body {

    min-height: 100vh;

    display: flex;

    align-items: center;

    justify-content: center;

    padding: 2rem;
}

.error-container {

    width: 100%;

    max-width: 880px;
}

.error-card {

    background: rgba(255,255,255,0.03);

    border: 1px solid rgba(255,255,255,0.06);

    border-radius: 28px;

    padding: 3rem;

    box-shadow: var(--shadow);
}

.error-code {

    font-size: 6rem;

    font-weight: 900;

    line-height: 1;

    margin-bottom: 1rem;

    background: var(--gradient);

    -webkit-background-clip: text;

    color: transparent;
}

.error-title {

    font-size: 2rem;

    margin-bottom: 1rem;
}

.error-description {

    color: var(--muted);

    font-size: 1.05rem;

    line-height: 1.9;

    max-width: 700px;

    margin-bottom: 2rem;
}

.url-box {

    background: rgba(255,255,255,0.03);

    border: 1px solid rgba(255,255,255,0.05);

    border-radius: 16px;

    padding: 1rem 1.2rem;

    font-family: 'JetBrains Mono', monospace;

    color: #93c5fd;

    margin-bottom: 2rem;

    overflow-x: auto;
}

.actions {

    display: flex;

    flex-wrap: wrap;

    gap: 1rem;

    margin-bottom: 3rem;
}

.suggestions {

    margin-top: 2rem;
}

.suggestions h2 {

    margin-bottom: 1.5rem;
}

.suggestion-list {

    display: flex;

    flex-direction: column;

    gap: 1rem;
}

.suggestion-item {

    display: block;

    background: rgba(255,255,255,0.03);

    border: 1px solid rgba(255,255,255,0.05);

    border-radius: 18px;

    padding: 1.3rem;

    transition: 0.2s ease;
}

.suggestion-item:hover {

    transform: translateY(-2px);

    border-color: rgba(99,102,241,0.25);
}

.suggestion-title {

    color: white;

    font-weight: 700;

    margin-bottom: 0.4rem;
}

.suggestion-meta {

    color: var(--muted);

    font-size: 0.9rem;
}

@media (max-width: 768px) {

    .error-card {

        padding: 2rem;
    }

    .error-code {

        font-size: 4rem;
    }

    .error-title {

        font-size: 1.5rem;
    }
}

</style>

</head>

<body>

<div class="error-container">

<div class="error-card">

<div class="error-code">

404

</div>

<h1 class="error-title">

Resource Not Found

</h1>

<p class="error-description">

The requested resource does not exist,
may have been moved,
or the URL may be incorrect.

You may have been looking for one of the related articles below.

</p>

<div
class="url-box"
id="broken-url"
>

</div>

<div class="actions">

<a
href="/blog/"
class="btn btn-premium"
>

<i class="fas fa-house"></i>

Home

</a>

<a
href="/blog/research/"
class="btn"
>

<i class="fas fa-book"></i>

Research

</a>

<a
href="/blog/labs/"
class="btn"
>

<i class="fas fa-terminal"></i>

Labs

</a>

</div>

<div class="suggestions">

<h2>

Maybe you were looking for…

</h2>

<div
class="suggestion-list"
id="suggestions"
>

</div>

</div>

</div>

</div>

<script>

const currentPath =
window.location.pathname
.toLowerCase();

document.getElementById(
"broken-url"
).innerText = currentPath;

const pathTokens =
currentPath
.replace(/[^a-z0-9\/-]/g, "")
.split(/[-\/]+/)
.filter(Boolean);

fetch("/blog/search.json")
.then(response => response.json())
.then(posts => {

    const scored = posts.map(post => {

        let score = 0;

        const haystack = `
            ${post.title}
            ${post.category}
            ${post.tags}
            ${post.content}
        `.toLowerCase();

        pathTokens.forEach(token => {

            if (haystack.includes(token)) {

                score += 1;

            }

        });

        return {
            ...post,
            score
        };

    });

    const matches =
    scored
    .filter(post => post.score > 0)
    .sort((a,b) => b.score - a.score)
    .slice(0,5);

    const container =
    document.getElementById(
        "suggestions"
    );

    if (matches.length === 0) {

        container.innerHTML = `
        <div class="suggestion-item">

            <div class="suggestion-title">

                No closely related resources found.

            </div>

            <div class="suggestion-meta">

                Try exploring the research or labs sections.

            </div>

        </div>
        `;

        return;
    }

    matches.forEach(post => {

        const item =
        document.createElement("a");

        item.href = post.url;

        item.className =
        "suggestion-item";

        item.innerHTML = `

        <div class="suggestion-title">

            ${post.title}

        </div>

        <div class="suggestion-meta">

            ${post.category}

        </div>

        `;

        container.appendChild(item);

    });

});

</script>

</body>

</html>
